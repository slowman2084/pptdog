testcases:
- id: case_0
  input: |
    我要讲的是我们团队引入 AI 做数据库回归测试的实践。主要有这几块：
    1. 背景：数据库版本升级时回归测试工作量大、靠人工、容易漏
    2. 我们做了什么：用 Repomind 做自动分析，接入 CI/CD 流水线
    3. 效果：回归测试时间从3天缩到4小时，漏测率降低80%
    4. 踩过的坑：Repomind 对非标准 SQL 分析不准，需要人工兜底
    5. 经验总结：AI 不替代测试工程师，而是让他们专注更有价值的部分
  skill_type: conversational-guide
  notes: |
    Happy Path（有清晰素材列表）：讲者已提供5条素材的概要，AI 应将其整理为带 M 编号的素材清单（含分类标签），并主动追问是否有遗漏。对核心素材（效果数据和踩坑）标记为需要深化。这是最典型的 plan-details 使用场景，对应 I1（知识外化）主需。
  expected_output: |
    好，你已经有了一个清晰的素材轮廓，我来帮你把这些东西整理成带编号的素材库。

    **当前素材清单（初稿）**

    | 编号 | 标题 | 类型 | 备注 |
    |------|------|------|------|
    | M01 | 数据库版本升级的回归测试痛点 | 证据 | 背景素材 |
    | M02 | Repomind + CI/CD 自动化方案 | 证据 | 核心方案 |
    | M03 | 效果数据：3天→4小时，漏测率-80% | 证据 | ⭐ 核心素材 |
    | M04 | 踩坑：非标准 SQL 分析不准 | 证据 | ⭐ 核心素材 |
    | M05 | 经验结论：AI 增强而非替代 | 观点 | 结论素材 |

    **还有遗漏吗？** 比如有没有某个让你印象特别深的「差点翻车」的时刻，或者某个「做了才发现意外有用」的发现，没有列进来的？

    ---

    M03 和 M04 是核心素材，需要深化。先从 M03 开始——
    「回归测试时间从3天缩到4小时」：**这3天是怎么分配的？**（人工跑用例 / 等待环境 / 人工分析结果？）理解这个才能知道 AI 省掉了哪个环节的时间，让数字更有说服力。
  Judge:
  - criterion: 将用户的5条素材整理为带 M 编号的清单，包含标题/类型/备注三列
    points: 25
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 主动追问「还有遗漏吗」，给出一次补充素材的机会
    points: 20
    tags:
    - axis:accuracy
  - criterion: 识别出效果数据（M03）和踩坑（M04）是核心素材，标记为需要深化
    points: 25
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 对核心素材发起了 Why 层追问（比如追问数字背后的机制），而非停留在整理完就结束
    points: 30
    tags:
    - axis:accuracy
    - type:positive

- id: case_1
  input: |
    我有一个核心案例：去年我们发现了一个 MySQL 8.0 的并发 BUG，影响了生产环境，Repomind 在 48 小时内自动定位了根因，比我们人工分析快了一倍。就这一个案例。
  skill_type: conversational-guide
  notes: |
    单案例深化（I3 深度挖掘主需）：讲者只提供了一个核心案例，AI 应引导讲者完成四段结构（Context/Conflict/Resolution/Result），特别是 Conflict 段（为什么这个 BUG 难找？人工分析碰到了什么具体障碍？）——这是案例最有价值的部分，也最容易被讲者跳过。
  expected_output: |
    好，这是一个很有力量的案例。让我帮你把它结构化，这样上台讲的时候有清晰的叙事线。

    案例四段结构框架（先填骨架，我们逐段确认）：

    **Context（背景）**
    MySQL 8.0 版本升级，生产环境上线后出现并发相关异常

    **Conflict（冲突/困难）—— 这段最重要，需要你补充**
    > 这个 BUG 为什么难找？人工分析时具体卡在哪？是日志太多看不过来，还是并发问题复现难，还是工具不支持？

    **Resolution（解决方案）**
    Repomind 自动分析，48小时内定位根因

    **Result（结果/影响）**
    比人工分析快一倍

    ---

    现在最需要你补充的是 Conflict 段——**你们人工分析时具体花时间在哪个环节？** 这一段说清楚了，听众才会理解「48小时」为什么了不起。
  Judge:
  - criterion: 输出了四段结构框架（Context/Conflict/Resolution/Result）
    points: 25
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 明确标注了 Conflict 段是最重要的部分，并对此段发起了具体追问（人工分析卡在哪个环节）
    points: 35
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 没有凭空补全 Conflict 段内容（等讲者回答后才填充，不编造讲者的经历）
    points: 25
    tags:
    - axis:accuracy
  - criterion: Result 段的现有内容（比人工快一倍）被保留，没有被 AI 替换为更「漂亮」的说法
    points: 15
    tags:
    - axis:accuracy

- id: case_2
  input: |
    我觉得「AI 不替代测试工程师，而是让他们专注更有价值的部分」这个结论很重要，一定要讲。
  skill_type: conversational-guide
  notes: |
    观点型素材的 Why 三层挖掘（I3 深度挖掘主需）：讲者提出了一个结论/观点，AI 应引导讲者完成 Why 三层推导——这个结论你是怎么得出来的（表层Why）、背后的机制是什么（深层Why）、可以复用的洞察是什么（根因/方法论）。没有三层 Why 的观点只是口号，无法打动听众。
  expected_output: |
    这个结论可以讲，而且应该讲得有力量。但现在它还是一句「口号」级别的话——听众听完可能会点头，但不会觉得受到了什么启发。

    我们来挖一下 Why 三层：

    **表层 Why（你是怎么得出这个结论的？）**
    → 你是基于哪个具体的观察或数据，才说「AI 不替代而是增强」？
    （比如：「引入 AI 后，测试工程师的工作时间分配从 70% 执行用例 → 30% 执行用例 + 70% 分析异常」？）

    **深层 Why（为什么会有这个效果？）**
    → 为什么 AI 做了重复执行，人就自然转向更高价值的工作，而不是直接被裁员或者变得更闲？

    **根因/方法论（可复用的洞察是什么？）**
    → 这件事是「AI 的特殊性」还是「任何自动化工具都会这样」？如果是前者，为什么？

    用三层挖下去，这个结论就不只是口号了——它会变成你对测试行业的一个判断，有了这个判断，听众才会觉得「这个人真的想清楚了」。
  Judge:
  - criterion: 识别出这是观点型素材，主动引导进行 Why 三层推导，而不是直接接受并整理
    points: 30
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 明确区分了三层（表层/深层/根因），每层给出了具体的追问方向
    points: 35
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 解释了为什么需要三层 Why（「口号」vs「有力量的判断」），让讲者理解深化的价值
    points: 35
    tags:
    - axis:accuracy
    - type:positive

- id: case_3
  input: |
    素材我觉得差不多了，帮我生成 details.md 吧
  skill_type: conversational-guide
  notes: |
    details.md 生成前的完整性检查（I1+I3 主需的最终守门）：在生成 details.md 前，AI 应先检查素材的完整性——有没有核心素材还未深化、有没有遗漏的关联关系。如果有核心素材的 Conflict 或 Why 三层还是空的，应提示讲者而非直接生成一份空洞的 details.md。
  expected_output: |
    好，在生成之前我快速检查一下素材完整性：

    ✅ M01（背景痛点）：已有基础描述
    ⚠️ M02（方案描述）：只有 What，缺 Why——为什么选 Repomind 而不是其他方案？
    ✅ M03（效果数据）：已深化（Case 分析完成）
    ⚠️ M04（踩坑）：Conflict 段还是空的——具体卡在什么地方？
    ✅ M05（结论）：已完成 Why 三层

    M02 和 M04 有缺口。

    你要继续补充这两条，还是先生成带标注的初稿（未深化的地方标注 [需补充]，演讲时你自己记得）？
  Judge:
  - criterion: 生成前做了完整性检查，逐条标注 ✅/⚠️ 状态
    points: 30
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 识别出核心素材中仍有 Conflict 或 Why 三层缺口，明确指出而不是忽略
    points: 35
    tags:
    - axis:accuracy
  - criterion: 提供了两个选项（继续补充 vs 带标注先生成），将决策权交给讲者，而不是直接生成或直接拒绝
    points: 35
    tags:
    - axis:accuracy
    - type:positive

- id: case_4
  input: |
    我还有一些参考资料：有一份性能诊断报告（PDF）、三郎工具的 PPTX 介绍、以及几张 AI 修复 BUG 的截图。怎么用进去？
  skill_type: conversational-guide
  notes: |
    References 素材关联（I1 知识外化的延伸）：讲者提到有外部参考资料（PDF/PPTX/截图），AI 应帮助讲者将这些资料关联到对应的素材条目，并说明每种类型资料在演讲中的使用方式（证据支撑/视觉展示/引用来源）。
  expected_output: |
    好，这几份资料可以直接用，分别对应不同的使用方式：

    | 资料 | 对应素材 | 使用方式 |
    |------|---------|---------|
    | 性能诊断报告（PDF）| M03 效果数据 | 作为证据支撑——提取报告中的关键数字/图表到 Slide，演讲时可以说「详细报告在这里」 |
    | 三郎工具介绍（PPTX）| M02 方案描述 | 视觉素材——截取工具界面截图用在 Slide 上，比纯文字描述更直观 |
    | AI 修复 BUG 截图 | M04 踩坑案例 | 最强视觉证据——实际操作界面截图是「真实性」的证明，放在案例页效果最好 |

    建议把这些文件放到项目的 references/ 目录下，gen-slides 生成时可以直接引用。

    M04 的截图现在有了，这条素材的 Conflict 段可以「展示截图 + 口述卡点」，不需要纯文字解释。要不要现在补充一下 Conflict？
  Judge:
  - criterion: 将每份参考资料关联到了对应的素材编号（M03/M02/M04），而不是泛泛而谈
    points: 30
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 说明了每种资料类型在演讲中的具体使用方式（证据支撑/视觉展示/引用来源），而不只是「可以用」
    points: 35
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 提到了 references/ 目录管理规范，并说明与 gen-slides 的对接方式
    points: 20
    tags:
    - axis:accuracy
  - criterion: 发现截图可以弥补未深化素材的缺口，主动提出继续深化 M04
    points: 15
    tags:
    - axis:accuracy
    - type:positive
