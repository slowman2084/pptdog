testcases:
- id: case_0
  input: '以下是一个演讲章节的 slide-content.md 片段，包含一章纯事实列举，没有推理逻辑：


    ## 第2章：我们的监控建设历程


    ### Slide 5 — Q1完成告警接入

    **论点类型：** 状态汇报型

    **PPT 上放：**

    布局：bullet_list

    - 2024年Q1：完成核心服务告警接入，覆盖率达到60%

    - 2024年Q2：推广到所有服务，覆盖率提升至90%

    - 2024年Q3：接入自定义告警规则，完成分级体系


    **演讲口头说：**

    - 承接上一页：讲完背景，我们来看看这一年我们做了什么

    - 核心内容：Q1我们做了告警接入，Q2我们继续推广，Q3我们建立了分级体系

    - 铺垫下一页：接下来看看效果


    请对该章节进行逻辑完整性审查，重点检查推理链条类型。

    '
  skill_type: analysis-review
  notes: 验证F1失败模式——纯事实堆砌章节必须生成 dimension=推理链条、severity=critical 的 suggestion（D1A强制识别原则）
  expected_output: "\U0001F50D 正在审查逻辑完整性（4个维度）...\n\n## 逻辑审查结果 — qcon-demo\n\n| #\
    \ | 维度 | 严重程度 | 位置 | 问题摘要 |\n|---|------|---------|------|---------|\n| logic-001\
    \ | 推理链条 | \U0001F534 critical | 第2章「监控建设历程」 | 这章只是按时间顺序列了三件事，没有说明为什么要这样做、做了之后有什么逻辑上的好处——听众听完只知道\"\
    你们做了很多\"，不知道\"这些选择为什么是对的\" |\n\n**共 1 条建议：critical 1 / major 0 / minor 0**\n\n\
    logic-001 建议选项：\nA. 在章节开头补充推理逻辑（演绎型）：\n   \"内容：在章节引入处加入：「监控建设必须先解决覆盖率问题，因为没有数据就无法发现问题。所以我们的路径是：先接入（覆盖率从0到60%）→\
    \ 再扩展（60%到90%）→ 最后精细化（分级告警）。每一步的门槛都是前一步的覆盖率达标。」\"\n   推荐理由：有了推理逻辑，听众明白为什么按这个顺序，而不是一堆时间线\n\
    \n✅ 逻辑审查完成，JSON 已写入：~/.pptdog/projects/qcon-demo/review-suggestions/logic-20260422T100000.json\n"
  Judge:
  - criterion: 生成了 dimension='推理链条' 且 severity='critical' 的 suggestion
    points: 25
    tags:
    - axis:accuracy
  - criterion: problem 字段用口语描述（不含'推理链断裂'/'事实堆砌违规'等方法论术语）
    points: 25
    tags:
    - axis:accuracy
  - criterion: options A 的 content 写出了具体补全推理逻辑的文字，而非'建议补充推理'
    points: 25
    tags:
    - axis:accuracy
  - criterion: 未跳过该章节直接进入下一维度审查
    points: 25
    tags:
    - axis:accuracy
- id: case_1
  input: '以下演讲片段包含一个有隐含假设的核心论点：


    ## 第3章：我们的实践经验可以复用


    ### Slide 8 — 三步法可以直接迁移

    **演讲口头说：**

    - 承接上一页：我们用这套监控三步法，把故障定位从43分钟降到3分钟

    - 核心内容：这套方法的底层逻辑很简单：先打通数据链路，再建立告警分级，最后做自动化响应。任何团队都可以套用这个框架，两个月内见效。

    - 铺垫下一页：下面我来说说怎么开始第一步


    请检查该论点的隐含假设。

    '
  skill_type: analysis-review
  notes: 验证D3B决策——所有非显式假设都应生成suggestion，包括'任何团队都可以套用'这个高风险普遍化假设
  expected_output: "## 逻辑审查结果 — qcon-demo\n\n| # | 维度 | 严重程度 | 位置 | 问题摘要 |\n|---|------|---------|------|---------|\n\
    | logic-002 | 隐含假设 | \U0001F7E1 major | 第3章·论点3.1「三步法可以直接迁移」——演讲口头说核心内容 | 你说\"\
    任何团队都可以套用\"，但这里有个隐含前提：听众团队的技术栈和监控基础设施跟你们相似。如果听众团队用的是完全不同的架构（比如纯云原生 vs 自建机房），第一步\"\
    打通数据链路\"的难度就差了十倍 |\n| logic-003 | 隐含假设 | \U0001F7E2 minor | 第3章·论点3.1——\"两个月内见效\"\
    \ | \"两个月内见效\"隐含了听众团队能快速调动资源推进的假设，但很多团队面临人力不足或跨团队协作摩擦，实际周期可能更长 |\n\nlogic-002\
    \ 建议选项：\nA. 在论点开头显式建立假设：\n   \"相信在座很多团队也有监控基础——哪怕是最基础的日志采集和告警。这套三步法的前提是你有数据源可以接入，如果完全是从零开始，第一步可能需要额外的基础设施投入。\"\
    \nB. 用互动方式让听众自己确认假设：\n   \"先做个小调查：你们现在有没有统一的告警平台？有的举手。（等待）好，有基础的同学，这套方法可以直接用；没有的，我们课后单聊。\"\
    \n"
  Judge:
  - criterion: 生成了针对'任何团队都可以套用'的 major 隐含假设 suggestion
    points: 25
    tags:
    - axis:accuracy
  - criterion: 正确识别出普遍化假设类型（'我们这样，所以大家都这样'）
    points: 25
    tags:
    - axis:accuracy
  - criterion: options A 写出了具体话术（'相信在座很多团队...'），而非'建议建立假设'
    points: 25
    tags:
    - axis:accuracy
  - criterion: problem 字段用口语描述（不含'普遍化假设违规'等术语）
    points: 25
    tags:
    - axis:accuracy
- id: case_2
  input: '以下演讲有两个章节，请检查章节间是否存在 MECE 重叠（章节层 MECE 检查）：


    演讲结构：

    ## 第2章：监控告警体系建设

    论点：2.1 统一告警平台接入 / 2.2 告警分级规则制定 / 2.3 告警响应流程优化


    ## 第3章：故障响应效率提升

    论点：3.1 告警分级与噪音降低 / 3.2 On-call 流程重构 / 3.3 平均定位时间从43分钟降至3分钟


    顶层结论：通过监控体系建设，我们把故障响应效率提升了90%。

    '
  skill_type: analysis-review
  notes: 验证D2B两层MECE检查——第2章的2.2'告警分级'和第3章的3.1'告警分级与噪音降低'存在章节层重叠，必须标为 major
  expected_output: "## 逻辑审查结果 — qcon-demo\n\n| # | 维度 | 严重程度 | 位置 | 问题摘要 |\n|---|------|---------|------|---------|\n\
    | logic-004 | MECE | \U0001F7E1 major | 章节层：第2章「监控告警体系建设」§2.2 vs 第3章「故障响应效率提升」§3.1\
    \ | 第2章的\"告警分级规则制定\"和第3章的\"告警分级与噪音降低\"说的是同一件事——一个讲制定规则，一个讲规则带来的效果。听众会困惑：这两章为什么要分开讲？\
    \ |\n\nlogic-004 建议选项：\nA. 合并到第2章，第3章只讲结果：\n   \"将第2章2.2保留为「告警分级规则制定（含降噪效果）」，删除第3章3.1，第3章聚焦整体效率提升结果（3.2\
    \ On-call流程 + 3.3 时间指标）\"\nB. 重新区分两章的边界：\n   \"第2章2.2改为「告警分级规则设计原则」（只讲为什么这样设计），第3章3.1改为「分级告警上线后的噪音数据变化」（只讲效果数据），边界清晰后两章不再重叠\"\
    \n"
  Judge:
  - criterion: 检查了章节层（## 节点间）的 MECE，不只是论点层
    points: 25
    tags:
    - axis:accuracy
  - criterion: 生成了 dimension='MECE' 且 severity='major' 的 suggestion（章节层重叠=major）
    points: 25
    tags:
    - axis:accuracy
  - criterion: options A 写出了具体的合并操作（哪章保留什么、删除什么）
    points: 25
    tags:
    - axis:accuracy
  - criterion: options B 写出了具体的区分方案（每章各自的边界是什么）
    points: 25
    tags:
    - axis:accuracy
- id: case_3
  input: '以下演讲包含一个对背景铺垫页的分析请求：


    ## 第1章：团队背景介绍（纯背景页）


    ### Slide 2 — 我们是谁

    **演讲口头说：**

    - 核心内容：我们是基础平台团队，负责公司内部所有服务的基础设施。团队规模40人，服务200+个业务团队，支撑日均流量5亿次请求。


    这页是纯背景铺垫，帮助听众了解团队规模。


    请对此页进行逻辑审查。

    '
  skill_type: analysis-review
  notes: 验证F5失败模式的反面——纯背景/铺垫页不应该被做隐含假设检查，应该对此类页面产生0条隐含假设 suggestion
  expected_output: '## 逻辑审查结果 — qcon-demo


    针对 Slide 2「我们是谁」（背景铺垫页）：


    推理链条：此页为背景信息传递，无需论证逻辑，不适用推理链条检查。✅ 跳过

    MECE：背景介绍页不涉及并列论点结构，不适用 MECE 检查。✅ 跳过

    隐含假设：背景铺垫页的目的是信息传递，不是论证，不生成隐含假设建议。✅ 跳过

    金字塔：背景页通常作为顶层结论的铺垫，合理。✅ 跳过


    **共 0 条建议**（此页为纯背景铺垫，无逻辑审查适用维度）

    '
  Judge:
  - criterion: 不对背景/铺垫页生成隐含假设 suggestion（对此页应为0条）
    points: 34
    tags:
    - axis:accuracy
  - criterion: 明确说明跳过原因（'此页为背景信息传递，不是论证'）
    points: 33
    tags:
    - axis:accuracy
  - criterion: 未把'日均流量5亿次'这类事实陈述当成需要验证假设的论点
    points: 33
    tags:
    - axis:accuracy
- id: case_4
  input: '以下是一场演讲的完整推理链分析请求。第2章使用了归纳推理，请检查其完整性：


    ## 第2章：监控分级方案有效


    ### 论点2.1：降低了误报率

    **演讲口头说：**

    告警分级之前，我们每天收到200条告警，P1告警占10%（20条）。告警分级之后，每天真正需要处理的P1告警从20条降到3条。


    我们的结论是：分级策略能有效降低告警噪音，提升响应效率。


    请识别推理类型，并检查是否完整。

    '
  skill_type: analysis-review
  notes: 验证D1A强制识别主线——只有一个数据点的归纳推理（单一数据）需要被标为缺陷，且context字段要注明推理类型
  expected_output: "## 逻辑审查结果 — qcon-demo\n\n推理类型识别：第2章「监控分级方案有效」\n→ 主线推理类型：**归纳推理**（从具体数据点归纳出\"\
    分级策略有效\"的结论）\n\n| # | 维度 | 严重程度 | 位置 | 问题摘要 |\n|---|------|---------|------|---------|\n\
    | logic-005 | 推理链条 | \U0001F7E1 major | 第2章·论点2.1「降低了误报率」——主线：归纳推理 | 你从一组数据（P1从20条降到3条）就下了\"\
    分级策略有效\"的结论。归纳推理需要至少2个以上独立的数据点或案例才能支撑结论——一个数字可能是巧合或季节性波动，不足以证明是策略的效果 |\n\nlogic-005\
    \ 建议选项：\nA. 补充第二个数据点强化归纳：\n   \"在论点2.1后补充：「这个效果在其他服务也得到了验证——核心支付链路在接入分级策略后，P1告警同样从日均15条降到2条。两条独立的数据线都指向同一个结论：分级策略有效。」\"\
    \nB. 改为溯因推理（更诚实的表述）：\n   \"把结论改为：「P1告警从20条降到3条，最可能的解释是分级策略把大量P2/P3噪音过滤掉了——当然也可能有其他因素，但这是我们改变的唯一变量。」\"\
    \n"
  Judge:
  - criterion: 正确识别出归纳推理为主线类型，在 context 字段注明
    points: 20
    tags:
    - axis:accuracy
  - criterion: 生成了 major suggestion（归纳案例不足=推理链不完整）
    points: 20
    tags:
    - axis:accuracy
  - criterion: options A 写出了具体的补充第二个数据点的文字
    points: 20
    tags:
    - axis:accuracy
  - criterion: options B 提供了改为溯因推理的替代方案
    points: 20
    tags:
    - axis:accuracy
  - criterion: problem 字段无'归纳推理不完整'等方法论术语
    points: 20
    tags:
    - axis:accuracy
