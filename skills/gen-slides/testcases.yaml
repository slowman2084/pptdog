testcases:
- id: case_0
  input: |
    /gen-slides
    （用户未带 --backend 参数，项目 db-effective-practise 已有 slide-content.md（35页）。环境中：huashu-design 未安装，baoyu-slide-deck 已安装，python-pptx 未安装，Marp 未安装。）
  skill_type: orchestration-dispatch
  notes: |
    Backend 选择主权验证（I1+I2 核心）：用户不带参数触发时，AI 必须先执行真实环境扫描，按如实原则展示所有 Backend 的安装状态（❌/✅），然后等待用户选择。严禁静默选择任何默认 Backend 开始生成。这是本次真实使用中发现 huashu-design 未安装、如实标注的场景。
  expected_output: |
    项目状态确认：

    📁 项目：db-effective-practise
    📄 slide-content.md：✅ 存在（35页，约63分钟）
    📄 review.md：⚠️ 不存在（跳过评审）
    📁 slides/：目录不存在（待生成）

    Backend 扫描结果：

    ❌ huashu-design        — 未安装（命令中指定了此 backend）
    ❌ python-pptx          — 未安装
    ❌ html-ppt-designer    — 未安装
    ❌ pptx skill           — 未安装
    ❌ Marp                 — 未安装
    ✅ baoyu-slide-deck     — 已安装
    ✅ 结构化 Markdown      — 始终可用

    ⚠️ 情况：你指定了 huashu-design，但该 skill 未安装。

    当前可用的 backend 是 baoyu-slide-deck（已安装）或导出 Markdown。
  Judge:
  - criterion: 执行了真实环境扫描，未安装的工具标注 ❌，已安装的标注 ✅，无虚假标注
    points: 30
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 展示了完整 Backend 列表（包含所有扫描的工具）并等待用户选择，未直接开始生成
    points: 30
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 未静默降级到 baoyu-slide-deck 或其他可用工具自动开始生成
    points: 25
    tags:
    - axis:accuracy
  - criterion: 打印了项目状态（slide-content.md 存在与否、review.md 状态、slides 目录状态）
    points: 15
    tags:
    - axis:accuracy

- id: case_1
  input: |
    /gen-slides
    （项目目录下没有 slide-content.md，只有 mindmap.md 和 details.md。）
  skill_type: orchestration-dispatch
  notes: |
    slide-content.md 缺失时的硬性停止行为：Preamble 阶段必须检测 slide-content.md 是否存在，不存在时立即停止并给出正确修复建议，不得继续扫描工具或展示 Backend 列表。
  expected_output: |
    📁 项目：[slug]
    📄 slide-content.md：⚠️ 不存在

    ⛔ 无法继续：slide-content.md 不存在，gen-slides 需要此文件作为输入。

    请先运行 /slide-content-and-scripts 生成内容稿，然后再执行 /gen-slides。
  Judge:
  - criterion: 检测到 slide-content.md 不存在后立即停止，打印了 ⛔ 错误提示
    points: 35
    tags:
    - axis:accuracy
  - criterion: 给出了正确的修复建议：运行 /slide-content-and-scripts
    points: 30
    tags:
    - axis:accuracy
  - criterion: 未继续执行后续步骤（未扫描工具、未展示 Backend 列表）
    points: 20
    tags:
    - axis:accuracy
  - criterion: 状态打印中 slide-content.md 标注为 ⚠️ 不存在
    points: 15
    tags:
    - axis:accuracy

- id: case_2
  input: |
    /gen-slides，选择 huashu-design，风格：简约商务风（白底 / 浅灰 + 强调色）
    （huashu-design 已安装，项目 db-effective-practise 已有 slide-content.md 35页。）
  skill_type: orchestration-dispatch
  notes: |
    Design System 定义能力（huashu-design backend）：选定 huashu-design 后，AI 应读取 design-context.md 参考资料，推导出与内容主题匹配的 Design System，包含明确的色彩、字型、节奏规范，并输出完整定义而非模糊描述。这是本次真实使用中用户最满意的设计环节，体现了 AI 的品位主张。
  expected_output: |
    清楚了。无品牌资产，直接走 fallback 品位锚点。

    设计系统（简约商务风）：

    方向：Editorial / refined minimal（资深工程师对象，内容密度高但克制）
    不走：紫渐变、emoji 图标、圆角 + 左 border accent（全是 slop）

    色彩：
    - Background: #FAFAFA（极浅暖灰）
    - Surface:    #FFFFFF
    - Text:       #1A1A1A
    - Muted:      #6B7280
    - Accent:     #0F52BA（深海军蓝，强调数字/关键词）
    - Danger-red: #DC2626（用于对比反差数字）

    字型：
    - Display:    Playfair Display（衬线 · 章节标题 / 大金句）
    - Body:       Inter（无衬线 · 正文 bullets）
    - Mono:       JetBrains Mono（数字 / 代码片段）

    节奏：8px base，spacing scale 8/16/24/32/48/64

    按规范：先做 2 页 showcase（封面 + 数据对比页），截图确认后再批量推 35 页。
  Judge:
  - criterion: 输出了明确的设计方向定义（不是「简洁」「商务感」等模糊词，而是具体的风格名称和负面约束）
    points: 25
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 包含完整色彩系统（至少 Background/Text/Accent 三个角色，带十六进制值）
    points: 25
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 包含字型系统（Display/Body/Mono 三个角色及对应字体名）
    points: 25
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 提出了先做 2 页 showcase 确认设计语法再批量生成的策略，未直接批量生成 35 页
    points: 25
    tags:
    - axis:accuracy
    - type:positive

- id: case_3
  input: |
    风格确认，继续批量生成全部页面
    （AI 已展示 2 页 showcase，用户确认风格后触发批量生成。）
  skill_type: orchestration-dispatch
  notes: |
    Showcase 确认机制后的批量生成：用户确认 showcase 风格后，AI 应展示截图或截图验证结果，然后批量生成剩余所有页面，最终组装 index.html 聚合演示版，交付完整文件清单。
  expected_output: |
    好，开始批量生成。封面和数据页已有，生成其余 33 页，然后组装 index.html。

    （批量生成完成后）

    全部完成。验证关键页面效果。

    36 个文件全部到位（35 页 + index.html）。

    交付物：
    - 位置：~/.pptdog/projects/db-effective-practise/slides/
    - 文件数：36 个 HTML（35页 slide-*.html + index.html 聚合演示版）
    - 演示方式：键盘 ←→ 翻页，G 键看缩略图，F 键全屏

    open ~/.pptdog/projects/db-effective-practise/slides/index.html
  Judge:
  - criterion: 批量生成全部剩余页面，文件数与 slide-content.md 页数一致
    points: 25
    tags:
    - axis:accuracy
  - criterion: 生成了 index.html 聚合演示版
    points: 25
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 交付信息包含文件路径和打开命令
    points: 25
    tags:
    - axis:accuracy
  - criterion: 提供了演示操作说明（翻页键/全屏/缩略图快捷键）
    points: 25
    tags:
    - axis:accuracy
    - type:positive

- id: case_4
  input: |
    （gen-slides 生成完成，用户等待最终交付收尾。项目使用 huashu-design backend，生成了 36 个 HTML 文件，其中 slide-27/28 含截图占位符 div 需要替换为真实图片。references/ 目录下有对应截图。）
  skill_type: orchestration-dispatch
  notes: |
    完整交付收尾能力：生成完成后 AI 应自动处理收尾工作——发现截图占位符时自动替换为真实 img 标签（使用相对路径），写入 timeline.jsonl，打印最终项目状态一览和演示入口。无需用户提示。这是本次真实使用中 AI 主动完成收尾的场景。
  expected_output: |
    待处理项：
    1. 截图占位符替换（slide-27/28）— 将 references/ 目录里的真实截图替换进去
    2. 写入 timeline.jsonl

    （替换截图占位符 div → img 标签，路径用 ../../references/ 相对路径）

    截图替换完成：
    - slide-27：ai_bugfix_case1.png 替换占位符 ✓
    - slide-28：ai_bugfix_case1_1.png + ai_bugfix_case2.png 替换占位符 ✓

    （写入 timeline.jsonl）

    全部收尾完成。

    演示文件入口：
    open ~/.pptdog/projects/[slug]/slides/index.html

    35 页幻灯片全部就绪，键盘 ←→ 翻页，G 键看缩略图，F 键全屏。
  Judge:
  - criterion: 发现截图占位符 div 时自动替换为真实 img 标签，路径使用相对路径（../../references/）
    points: 30
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 写入了 timeline.jsonl 记录
    points: 20
    tags:
    - axis:accuracy
  - criterion: 打印了最终演示入口路径和打开命令
    points: 25
    tags:
    - axis:accuracy
  - criterion: 替换操作精准定点（不修改 HTML 文件中的其他内容）
    points: 25
    tags:
    - axis:accuracy
