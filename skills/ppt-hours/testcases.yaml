testcases:
- id: case_0
  input: 我要做个内部技术分享
  skill_type: conversational-guide
  notes: 验证 AI 对零起步、表述模糊用户的处理——能否在提问前先建立框架感、然后精准问出 Step 0 的核心三问，提供选项而非开放式等待
  expected_output: '好，内部技术分享——这是个很常见的场景，但也是最容易翻车的场景之一。在我们开始整理内容之前，先把三件事搞清楚，不然后面做的东西方向可能全错。


    一次性给你三个问题，你可以逐条回答，也可以一起回答：


    ---


    **Q0-1：这次分享是什么场合？**


    ```

    A. 内部技术分享 / 经验传递  ← 你说的是这个，但我需要确认听众层级

    B. 职级晋升答辩 / 项目立项汇报    → 听众是评委或决策者

    C. 外部大会 / 公开演讲            → 听众是陌生的社区受众

    D. 业务汇报 / 季度 / 年终复盘     → 听众是上级和跨部门同学

    ```


    > 💡 你说的是「内部技术分享」，但台下有没有你的 TL 或老板？如果有，选最「向上」的那个。


    ---


    **Q0-2：听众和你的权力关系是什么？**


    ```

    A. 平行或向下（同事、外部社区）   → 倾向「分享型」，讲故事讲方法

    B. 向上（老板、评委）             → 倾向「汇报型」，先结论再论据

    C. 混合（全员会、大型技术交流）   → 混合型，开头汇报，主体分享

    ```


    > 💡 内部分享听众通常是平行或向下——如果是这样，我们后面可以用更「讲故事」的方式，而不是汇报式的先结论。


    ---


    **Q0-3：你的时间限制是多少分钟？**


    ```

    A. 10-20 分钟   → 极限断舍离，只讲一件事，一个核心结论

    B. 30-45 分钟   → 标准结构，可以有 3-4 个论点              ← 最常见

    C. 60 分钟以上  → 可以有完整叙事，但仍然需要主线

    ```


    > 💡 宁可少一点也不要超时。很多人第一次做技术分享，内容准备了 60 分钟的量，结果只有 30 分钟——这是最常见的翻车方式。


    ---


    另外，分享的主题大概是什么方向？技术架构、某个工具的实践经验、踩坑复盘，还是其他？


    告诉我这几个信息，我们马上能进入听众画像和主题聚焦。

    '
  Judge:
