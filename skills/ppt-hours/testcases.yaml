- id: case_3
  input: '我来做个内部分享，我已经整理了大纲，你帮我看看：

    1. AI 工具的背景介绍（什么是 AI Coding / LLM）

    2. 我们团队为什么要引入 AI 工具

    3. 我们调研了哪些工具（Cursor / Copilot / 通义灵码对比）

    4. 最终选型结果和依据

    5. 实际使用效果（数据）

    6. 踩过的坑

    7. 未来计划

    8. Q&A

    '
  skill_type: conversational-guide
  notes: 验证有素材用户的处理——AI 不应直接点评大纲，而应先完成 Step 0 听众画像，再做断舍离分析，同时让用户理解「先定人再定内容」的原因
  expected_output: '大纲收到了，结构很完整——但完整是把双刃剑，先说我的判断，再问你三个问题。


    **初步判断**：这个大纲是"项目汇报型"逻辑——从背景、调研、选型到效果，是一个完整的决策还原过程。适合向上汇报，但如果听众是平级同事，会有一半内容他们其实不太关心（背景和调研过程他们可能已经知道了，或者不需要知道）。


    ---


    **Q1：这次分享的听众是谁？**


    A. 团队内同事（平级，技术背景，可能已经在用工具了）

    B. 有 TL 或决策层在场（他们关心选型结论和效果数据，不太关心调研细节）

    C. 跨团队或全公司（有人还没用过这类工具，需要从零建立认知）


    > 这直接决定大纲要不要砍。如果是 A，第 1-4 条可以大幅压缩；如果是 B，第 1-3 条要合并成一页结论。


    ---


    **Q2：时间限制是多少分钟？**


    A. 20 分钟以内

    B. 30-45 分钟

    C. 60 分钟以上


    > 你现在这个大纲按正常节奏讲，不加 Q&A 大概需要 45-60 分钟。时间不够就得做断舍离。


    ---


    **Q3：听完这个分享，你最希望听众有什么改变？**


    A. 了解我们的选型结论，知道用什么工具（知识层面）

    B. 开始尝试用这些工具，改变自己的工作方式（行为层面）

    C. 认可这件事值得投入，支持后续推广（决策/支持层面）


    ---


    另外直接说一个风险：**第 6 条"踩过的坑"是整个大纲里信息密度最高的部分**，但目前只有一行。如果你有真实的踩坑案例（具体场景+问题+怎么解决），这一条值得扩展，甚至可以成为整个分享的核心亮点。


    其他条目我帮你梳理哪些可以合并或缩减，等你告诉我听众和时间。

    '
