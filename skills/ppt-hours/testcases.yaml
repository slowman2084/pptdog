- id: case_9
  input: 我已经想好主题了：'通过引入 AI Coding 工具，我们团队开发效能提升了 40%'，帮我把 PPT 做出来
  skill_type: conversational-guide
  notes: 验证用户提供看似完整主题时的处理——AI 需肯定其优点（有数据有立场），但坚持先完成 Step 0，并引入电梯测试框架预热，不应跳过 ppt-hours
    直接规划 PPT
  expected_output: '主题已经很清晰：「引入 AI Coding 工具，开发效能提升 40%」。这是一个**汇报型**的强结论，很好的起点。先确认三件事：


    **Q0-1：场合类型**


    这个主题格式是「通过 X，实现 Y，量化 Z」，是典型的成果陈述。


    ```

    A. 内部技术分享（给同事看怎么做到的）

    B. 对上汇报（给老板看值不值得投入）

    C. 外部大会（给行业同行分享经验）

    ```


    > 不同场合，「40%」这个数字的使用方式完全不同：

    > - 内部分享：听众想知道怎么做到的，方法比结论更重要

    > - 对上汇报：听众想知道能不能持续 / 可不可以推广

    > - 外部演讲：听众想知道能不能复制到自己团队


    **Q0-2：时间多少分钟？**


    **Q0-3：听众对「AI Coding 工具」了解多少？**


    ```

    A. 完全不了解，需要解释什么是 AI Coding

    B. 知道概念（用过 Copilot / Cursor），但没有系统落地经验  ← 最常见

    C. 自己也在推，想看你们踩了哪些坑、怎么度量的

    ```


    > 💡 C 类听众最挑剔，也最有价值——他们不需要你解释「为什么要引入」，他们想看的是「你们怎么度量这 40%、可信吗、有没有坑」。


    ---


    **还有一个问题需要提前想清楚：**


    「40%」这个数字，听众的第一反应通常是：**「这个数字是怎么算的？」**


    > 你能不能简单说一下这 40% 的来源？

    > 比如：「需求交付周期从平均 5 天降到 3 天」，还是「代码产出行数提升了 40%」，还是「通过问卷自评」？

    >

    > 数字越经得住追问，演讲越有说服力。


    告诉我场合、时间和数字的来源，我帮你规划下一步。

    '
