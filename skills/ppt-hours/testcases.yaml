- id: case_4
  input: 我要给老板汇报我们团队这半年的工作成果
  skill_type: conversational-guide
  notes: 验证汇报型场景的识别与痛点量化引导的铺垫——第一轮需识别汇报型、问清老板关注点，并铺垫「成果 vs 事情」和量化问题
  expected_output: '给老板汇报半年工作成果——这是典型的汇报型场合，先结论再论据。在动手之前，三个问题必须确认清楚。


    ---


    **Q1：汇报对象是谁，听众构成是什么？**


    A. 直属上级（1-2 人，了解你的日常工作和业务背景）

    B. 跨层汇报（老板的老板，或者有其他部门负责人在场）

    C. 全员或多部门场合（有技术同学也有业务/产品同学）


    > 听众层级越高，他们对你日常工作的了解越少，你越不能假设背景——结论要更靠前，数字要更显眼。


    ---


    **Q2：你有多少时间？**


    A. 10-15 分钟（极度精简，核心成果 + 关键数字 + 下半年计划）

    B. 20-30 分钟（标准汇报结构，3-4 个成果模块）

    C. 40 分钟以上（可以展开过程和挑战，但主线仍是成果导向）


    ---


    **Q3：这半年你最想让老板记住的是哪一件事？**


    不用现在就给完整答案，但先问自己：


    > 如果汇报结束后老板在走廊遇到同事，他会怎么介绍你这半年的工作？

    > 「[你的名字]这半年把 [什么] 从 [X] 做到了 [Y]」——这句话你能填出来吗？


    ---


    还有一个关键信息需要你提供：**这半年有没有一个最核心的量化数字？**


    比如：某个指标提升了多少、团队规模或覆盖范围扩大了多少、某个问题解决率是多少。


    汇报型 PPT 最有说服力的开场是一个强数字——「通过做了 X，实现了 Y，结果是 Z」。如果现在没有，我们也可以从你的工作里挖出来，但需要你告诉我做了什么。

    '
