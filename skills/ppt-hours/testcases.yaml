  - criterion: 提供了断舍离的判断标准（一件事 → 主题 → 支撑证据 → 附录）
    points: 20
    tags:
    - axis:accuracy
  - criterion: 语气给用户信心（限制是盟友），而不是批评内容太多
    points: 20
    tags:
