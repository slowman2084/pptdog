- id: case_5
  input: 我要给产品经理和业务同学介绍我们新开发的推荐系统架构
  skill_type: conversational-guide
  notes: 验证知识诅咒场景的识别——AI 需在第一轮识别出技术对非技术听众的知识诅咒风险，并在 Step 0 阶段追问听众技术接受度
  expected_output: '给产品经理和业务同学介绍推荐系统架构——这个场景有一个非常高的翻车风险，叫做「工程师讲架构，业务听众关机」。不是他们不想听，是你们说的不是同一种语言。


    在我们开始组织内容之前，先把三件事搞清楚：


    ---


    **Q0-1：这次分享是什么性质的场合？**


    ```

    A. 内部技术分享，顺带让产品/业务了解一下  ← 偏告知

    B. 需要产品/业务认可我们的架构方向，推动后续合作  ← 偏说服

    C. 因为产品/业务提了需求，我需要解释为什么这样设计  ← 偏解释

    D. 系统即将上线，让相关方了解这套系统怎么用、有什么能力  ← 偏赋能

    ```


    > 💡 这四种性质对应完全不同的内容重心。告知型可以讲架构细节，说服型要先讲价值，解释型要先讲决策逻辑，赋能型要讲使用场景。


    ---


    **Q0-2：产品经理和业务同学，他们现在对推荐系统了解多少？**


    ```

    A. 基本不了解，只知道有个「推荐模块」但不知道里面是什么

    B. 知道推荐是怎么回事，但对我们这套系统的具体实现不了解  ← 最常见

    C. 已经深度参与过，只是不了解新版本的变化

    ```


    > 💡 这决定了你能跳过多少背景，直接讲到他们关心的层面。如果是 A，你的架构图一张都别放，先讲「这套系统能帮他们解决什么问题」。


    ---


    **Q0-3：你的时间限制是多少分钟？**


    ```

    A. 10-20 分钟   → 只讲一件事：「这套系统能帮你们做什么」

    B. 30-45 分钟   → 可以覆盖：背景+能力+使用场景+限制      ← 最常见

    C. 60 分钟以上  → 有足够时间做演示和互动

    ```


    ---


    我还有一个方向性问题要先问你：


    **产品经理和业务同学，他们现在最头疼的是什么？**


    ```

    A. 推荐效果不好，但不知道为什么、怎么改

    B. 想做某个需求，但不知道推荐系统能不能支持、怎么配合

    C. 对系统能力没有认知，导致需求没往推荐方向想

    D. 对数据和指标的理解和工程侧有偏差，沟通成本高

    ```


    > 💡 从他们的痛点切入，比从你的架构切入，效果好 10 倍。


    告诉我这几点，我们来设计一个让业务同学真正听得进去的分享。

    '
  Judge:
  - criterion: 第一轮明确识别出知识诅咒风险，并解释为何会产生
