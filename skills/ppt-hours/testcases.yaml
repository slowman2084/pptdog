- id: case_6
  input: 我下周要做分享，只有15分钟，但我有很多东西要讲
  skill_type: conversational-guide
  notes: 验证时间极度受限场景——AI 需在第一轮量化 15 分钟的实际容量，引导用户做断舍离的心理准备，同时完成 Step 0
  expected_output: '15 分钟，内容很多——这是一个非常典型的高压场景，也是最容易翻车的组合。解法只有一个：**断舍离**。不是怎么把很多东西塞进
    15 分钟，而是搞清楚这 15 分钟里你只能讲一件事，然后把其他的全扔掉。


    在我们开始之前，先把三件事搞清楚：


    ---


    **Q0-1：这次分享是什么场合？**


    ```

    A. 内部技术分享 / 经验传递        → 听众是平级同事或下级

    B. 职级晋升答辩 / 项目立项汇报    → 听众是评委或决策者

    C. 外部大会 / 公开演讲            → 听众是陌生的社区受众

    D. 业务汇报 / 季度 / 年终复盘     → 听众是上级和跨部门同学

    ```


    > 💡 场合决定你的「断舍离方向」：内部分享的断舍离是砍背景留干货，汇报型的断舍离是砍过程留成果，大会演讲的断舍离是砍细节留洞察。


    ---


    **Q0-2：听众和你的权力关系是什么？**


    ```

    A. 平行或向下（同事、外部社区）   → 可以讲故事讲经过

    B. 向上（老板、评委）             → 必须先结论，再说论据  ← 推荐默认

    C. 混合（有老板也有同事）         → 开头汇报，主体分享

    ```


    > 💡 15 分钟的向上汇报，你的第一句话就要是结论。没有时间铺垫。


    ---


    **Q0-3：你说「有很多东西要讲」——大概是哪些方向？**


    ```

    A. 时间跨度很长，做了很多件事，每件都想说

    B. 一件事，但有很多层细节，每层都觉得重要

    C. 几个并列的成果，每个都觉得砍掉可惜

    D. 背景+过程+结果都想讲，不知道哪个可以省

    ```


    > 💡 这四种情况对应不同的断舍离策略。告诉我你是哪种，我们才能针对性地帮你做取舍。


    ---


    一个直接的问题先给你：


    **如果 15 分钟结束后，你希望听众对走廊里遇到的同事说什么？用一句话说出来。**


    > 模板参考：「他们用 [方法/成果]，把 [指标] 从 X 做到了 Y」

    > 或者：「原来 [大家以为的事] 其实是 [更深层的真相]」


    如果你现在能说出这句话，我们 15 分钟的内容就有了主线。如果说不出来，说明内容还没收拢——这才是真正要解决的问题。

    '
