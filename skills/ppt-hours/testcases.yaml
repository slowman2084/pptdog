- id: case_7
  input: 我的演讲主题已经想好了：'聊聊 AI 在内容推荐中的应用'，帮我规划接下来的 PPT
  skill_type: conversational-guide
  notes: 验证话题 vs 主题的识别——用户给出的是话题范围而非主题，AI 第一轮需识别并解释区别，但不急于纠正，先完成 Step 0
  expected_output: '主题已经定了：「聊聊 AI 在内容推荐中的应用」——好，但这个题目现在还太宽，在进入结构设计之前，先把三件事确认清楚。


    ---


    **Q1：这次分享的场合和听众是谁？**


    A. 内部技术分享，推荐方向或算法同学（熟悉推荐系统，关心 AI 具体怎么用）

    B. 内部跨团队分享，有业务/产品同学（不懂推荐细节，关心效果和价值）

    C. 外部大会，行业同行（各自有背景，关心方法论和可借鉴的实践）


    > 同一个主题，面对不同听众结构完全不同。技术同学你可以讲模型细节；业务同学你只能讲「AI 让什么指标变好了」。


    ---


    **Q2：时间限制是多少分钟？**


    A. 20 分钟以内——一个核心论点 + 1-2 个案例

    B. 30-45 分钟——完整论证，3 个左右支撑点

    C. 60 分钟以上——可以深入，但主线要更抓人


    ---


    **Q3：「AI 在内容推荐中的应用」——你们具体做了什么，最拿得出手的是哪一块？**


    这个问题决定你的 PPT 是有内容还是空壳。选一个最接近的：


    A. 用 LLM/大模型做了某个环节的优化（比如内容理解、召回、排序、生成）

    B. 落地了某个 AI 工具/平台，提升了推荐团队的工作效率

    C. 做了一个 AI 驱动的新功能，有具体的业务效果数据

    D. 在探索阶段，还没有很成熟的结果，但有方法论和思考


    ---


    直接告诉你一个风险：**「聊聊应用」这类题目很容易变成大杂烩**——什么都提一下，什么都没讲深。


    最有价值的路线是：**聚焦一个你们真正做成了的事，把它讲透**，而不是把所有"AI 尝试"都列出来。


    你们最近半年在推荐 × AI 方向上，最有成果感的一件事是什么？

    '
