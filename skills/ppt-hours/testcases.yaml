- id: case_2
  input: 下个月有个行业大会，我被邀请演讲，主题是介绍 AI 在我们团队中的应用
  skill_type: conversational-guide
  notes: 验证外部演讲+宽泛话题的识别——AI 需识别这是外部演讲，且「介绍 AI 应用」是话题而非主题，第一轮标记但不急于挑战，先完成 Step 0
  expected_output: '行业大会受邀演讲——这个场景有意思，因为你同时面对几个挑战：听众是陌生人、对你的团队背景零了解、时间通常有限但期待值很高。在你准备内容之前，先把三件事搞清楚。


    一次性给你三个问题，你可以逐条回答，也可以一起回答：


    ---


    **Q0-1：这次演讲的场合定位是什么？**


    ```

    A. 内部技术分享 / 经验传递

    B. 职级晋升答辩 / 项目立项汇报

    C. 外部大会 / 公开演讲  ← 你说的是这个

    D. 业务汇报 / 季度 / 年终复盘

    ```


    > 💡 C 类场景的核心挑战是：听众没有义务关注你——他们可以低头看手机。你需要在前 2 分钟就给他们一个「值得继续听」的理由。


    ---


    **Q0-2：这个行业大会的听众构成是什么？**


    ```

    A. 技术从业者为主（工程师、架构师、技术负责人）

    B. 管理者 + 技术混合（CTO、技术总监、资深工程师）  ← 大多数行业大会是这种

    C. 行业从业者（产品、运营、业务方向为主，非技术背景为主）

    D. 不确定，大会没有详细说明听众构成

    ```


    > 💡 你的主题是「AI 在团队中的应用」，这个题目对技术听众和业务听众的切入角度完全不同——技术听众想知道「怎么做到的」，业务听众想知道「有什么用」。搞清楚这点，内容方向会差很多。


    ---


    **Q0-3：你的演讲时间限制是多少分钟？**


    ```

    A. 10-20 分钟   → 极限聚焦，只讲一个核心洞察，配一个完整案例

    B. 30-45 分钟   → 标准结构，可以有 2-3 个论点，每个配案例  ← 最常见

    C. 60 分钟以上  → 可以有完整叙事弧，但主线要极度清晰

    ```


    > 💡 行业大会演讲超时几乎是职业失误，会直接影响你在这个圈子里的口碑。


    ---


    还有一个方向性的问题先问你：


    **你们团队 AI 应用这个主题，你最想让听众带走的是哪一类东西？**


    ```

    A. 一套可复用的方法/框架（「我回去也能照着这个思路做」）

    B. 一个反直觉的洞察（「原来大家以为的 X 其实是错的，真相是 Y」）  ← 大会演讲高价值

    C. 一组真实数据和案例（「他们真的做到了，而且是这么做到的」）

    D. 一个行业趋势判断（「这件事在未来会越来越重要」）

    ```


    告诉我这几点，我们开始针对行业大会的特性来设计你的演讲。

    '
  Judge:
  - criterion: 识别出这是外部演讲场合，且有影响力要求
    points: 20
    tags:
    - axis:accuracy
  - criterion: Step 0 包含大会类型/听众构成/时间/邀请背景四类信息
    points: 20
    tags:
    - axis:accuracy
  - criterion: 清晰解释了「话题 vs 主题」的区别，并给出了同一话题下三个不同主题的例子
    points: 20
    tags:
    - axis:accuracy
  - criterion: 没有立即要求用户改主题，告知后续会回到这里
    points: 20
    tags:
