- id: case_1
  input: 我要准备晋升答辩，要说这一年做了什么
  skill_type: conversational-guide
  notes: 验证对晋升答辩（汇报型）的场景识别——AI 需识别这是向上汇报场景，并在第一轮铺垫「成果 vs 事情」的陷阱，但不急于追问
  expected_output: '晋升答辩，搞清楚这三件事比你列多少成果更重要。


    直接问你，一起回答：


    ---


    **Q1：这次答辩的场合和听众是谁？**


    A. 部门内晋升，评委是本部门 TL 和 P 级同学

    B. 跨部门答辩，评委有业务侧或不了解你日常工作的人

    C. 大晋升（M/P7+），评委层级明显高于你，可能不了解技术细节


    > 评委越"陌生"，你越不能假设他们知道你的背景，结论要更靠前。


    ---


    **Q2：你的时间限制是多少？**


    A. 15 分钟以内——极度精简，核心成果+一个亮点故事

    B. 20-30 分钟——标准结构，3-4 个成果模块

    C. 30 分钟以上——可以有完整叙事，但主线必须清晰


    ---


    **Q3：你这一年最想让评委记住的是哪一件事？**


    现在脑子里第一个蹦出来的是什么？不用完整，一个关键词或一句话都行。


    > 判断标准：如果评委答辩结束后在走廊讨论，他们会用什么词描述你？「做了很多事」≠ 晋升理由，「在 X 方向上做出了 Y 结果」才是。


    ---


    还有一个关键问题单独问你：**你这一年的工作，有没有一个核心数字或可量化的结果？**


    比如：故障率下降多少、效率提升多少、覆盖业务多少个。有的话先告诉我，这会直接决定你的 PPT 开场怎么写。

    '
