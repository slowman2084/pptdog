testcases:
- id: case_0
  input: |
    我要做一个技术分享，讲 AI 在数据库测试中的实践，听众是我们团队的研发同学，大概60分钟。
  skill_type: conversational-guide
  notes: |
    技术分享 Happy Path（基于真实场景逆推）：用户提供了基本信息（场合/主题/听众/时长），AI 应完成场合定性（分享型），推进到听众具象化（「研发同学」太模糊，需追问角色/经验层级），同时提示数据库测试领域可能存在的知识诅咒陷阱。这是本次真实演讲准备流程的起点场景。
  expected_output: |
    好，技术分享，60分钟，听众是研发同学。这个场合定下来了：分享型（平行向下），核心逻辑是「讲方法讲故事」而非「先结论再论据」。

    在继续之前，听众画像需要再细化一下——「研发同学」目前太宽泛，直接用会导致后面的内容取舍没有标准。

    **Q1：听众的具体构成是什么？**
    A. 数据库方向的专职测试工程师（了解 SQL/存储引擎原理）
    B. 后端研发（写业务代码，对数据库是用户而非专家）
    C. 混合型（测试 + 研发都有，技术背景差异较大）
    D. 其他：_______

    **Q2：他们的工作年限大概是？**
    A. 1-3年（刚入行，对 AI 工具有热情但经验浅）
    B. 3-7年（有实战经验，对「又一个 AI 工具」保持审慎）
    C. 7年以上（技术老鸟，对通用结论不感兴趣，只关心边界和坑）

    这两个问题直接决定「你能假设听众知道什么」，把这些搞清楚之后内容取舍就清晰了。
  Judge:
  - criterion: 完成了场合定性，明确标注「分享型（平行向下）」，并说明分享型 vs 汇报型的核心区别
    points: 20
    tags:
    - axis:accuracy
  - criterion: 识别出「研发同学」描述太模糊，主动追问了至少两个具体维度（角色/经验层级）
    points: 30
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 追问问题提供了选项而非纯开放式，降低用户思考负担
    points: 25
    tags:
    - axis:accuracy
  - criterion: 没有直接接受模糊描述继续往下走（不输出「好，听众是研发同学，开始做画像卡」）
    points: 25
    tags:
    - axis:accuracy

- id: case_1
  input: |
    /ppt-hours
    我要做个内部技术分享
  skill_type: conversational-guide
  notes: |
    零起步模糊用户的处理：用户表述极简（只有场合，无主题/听众/时长信息），AI 应先建立框架感（让用户知道 ppt-hours 要解决什么问题），然后精准问出 Step 0 的核心三问，提供选项而非开放式等待。
  expected_output: |
    好，内部技术分享——这是个很常见的场景，但也是最容易翻车的场景之一。

    在我们开始整理内容之前，先把三件事搞清楚，不然后面做的东西方向可能全错。

    一次性给你三个问题，你可以逐条回答，也可以一起回答：

    ---

    **Q0-1：这次分享是什么场合？**

    ```
    A. 内部技术分享 / 经验传递
    B. 职级晋升答辩 / 项目立项汇报
    C. 外部大会 / 公开演讲
    D. 业务汇报 / 季度 / 年终复盘
    ```

    ---

    **Q0-2：听众和你的权力关系是什么？**

    ```
    A. 平行或向下（同事、外部社区）
    B. 向上（老板、评委）
    C. 混合（全员会、大型技术交流）
    ```

    ---

    **Q0-3：时间限制是多少？**

    ```
    A. 15 分钟以内
    B. 30 分钟左右
    C. 60 分钟左右
    D. 无时限
    ```
  Judge:
  - criterion: 在提问前先铺垫了框架感（说明这三件事为什么重要），而非直接抛问题
    points: 20
    tags:
    - axis:accuracy
  - criterion: Step 0 三问全部覆盖：场合类型 / 听众权力关系 / 时间限制
    points: 30
    tags:
    - axis:accuracy
  - criterion: 三个问题都提供了选项（A/B/C/D），而非纯开放式
    points: 25
    tags:
    - axis:accuracy
  - criterion: 未跳过 Step 0 直接进入听众画像或主题讨论
    points: 25
    tags:
    - axis:accuracy

- id: case_2
  input: |
    听众就是普通研发同学，大家都懂的，不需要再细化了。
    （上一轮 AI 追问了听众具体构成，用户给出模糊回答并表示不想继续细化。）
  skill_type: conversational-guide
  notes: |
    防敷衍机制——模糊画像拦截（I2 主需的守门）：用户拒绝细化听众描述时，AI 不能直接接受并继续。必须给出一个具体的「后果示例」让用户理解为什么这样的描述会造成问题，然后提供最低成本的追问（1-2个关键问题）让用户接受。关键：不是说「你必须回答」，而是让用户看到「不回答会怎样」。
  expected_output: |
    好，我理解你不想花太多时间在这里。但有一个实际问题需要先说清楚：

    如果画像停在「普通研发同学」，我在帮你设计内容时会遇到这样的困境：

    > 「AI 在数据库测试中的效果」——到底要不要解释什么是回归测试？
    > - 如果听众是数据库专职测试，不解释（他们烦了）
    > - 如果听众是后端业务研发，必须解释（他们看不懂）

    这两种情况，同一页 PPT 的内容完全不同。

    我只需要你确认一件事：**听众的主体是写业务代码的研发，还是有数据库/测试背景的工程师？**

    （二选一就行，不用展开解释）
  Judge:
  - criterion: 没有直接接受「普通研发同学」并继续（不输出画像卡或继续下一步）
    points: 35
    tags:
    - axis:accuracy
  - criterion: 给出了具体的后果示例，说明模糊画像会导致什么实际问题（用具体场景而非抽象劝说）
    points: 35
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 将最终追问压缩到最低成本（1-2个关键问题），而非让用户回答完整画像卡
    points: 30
    tags:
    - axis:accuracy

- id: case_3
  input: |
    我只有30分钟，我想讲：AI 如何帮我们提升数据库测试效率（包括测试用例自动生成、回归分析、异常检测三块），还有团队引入 AI 工具的经验总结，以及未来的 AI 数据库测试趋势展望。
  skill_type: conversational-guide
  notes: |
    防敷衍机制——多重重点强制拆分（I4 主需的守门）：用户在 30 分钟内塞了三个并列主题，AI 必须直接指出「这塞不下」，并强制要求二选一或三选一，给出有实质差异的候选主题。不能假装这三块都能塞进去。
  expected_output: |
    等一下——你刚才说了三件不同的事：

    1. AI 提升数据库测试效率（测试用例 + 回归 + 异常检测）
    2. 团队引入 AI 工具的经验总结
    3. 未来 AI 数据库测试趋势展望

    30 分钟只够讲透一件事。三件事都讲 = 三件事都讲浅，听众走出去记不住任何一件。

    这三个方向的差异很大，你必须选一个：

    A. **效果案例型**（你的1）——「我们用 AI 做了这些，数字是这样」，适合让听众知道「能做什么」
    B. **经验总结型**（你的2）——「我们踩过哪些坑，结论是这样」，适合让听众「学会怎么做」
    C. **趋势展望型**（你的3）——「这个领域未来会发生什么」，适合让听众「建立判断框架」

    你的核心目的是什么？你更想让听众「知道能做什么」还是「知道怎么做」？
  Judge:
  - criterion: 准确识别出用户塞了三个并列主题，并明确指出 30 分钟放不下
    points: 30
    tags:
    - axis:accuracy
  - criterion: 强制要求用户选择而非尝试把三块都压缩进去（「每块讲10分钟」是错误路径）
    points: 35
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 给出了 ≥2 个有实质差异的候选主题方向，每个附 1 句说明其适用场景
    points: 35
    tags:
    - axis:accuracy
    - type:positive

- id: case_4
  input: |
    听众是我们团队的数据库测试工程师（专职 DBA + QA，3-8年经验），主题大概是讲 AI 在我们数据库回归测试中的应用，60分钟，格式是组内技术分享。
    这些信息够了吗？可以往下走了吗？
  skill_type: conversational-guide
  notes: |
    信息充足时快速推进（I5 信心确认）：用户主动提供了较完整的信息（场合/听众角色+经验/主题方向/时长），并问「能往下走了吗」。AI 应确认信息充足，输出听众画像卡初稿，并标注已知陷阱，推进到主题收敛。不能再绕回去问之前已回答的问题。
  expected_output: |
    够了，可以往下走。

    基于你说的，先出一张听众画像卡：

    **听众画像卡 v1（初稿）**

    | 字段 | 内容 |
    |------|------|
    | 角色 | 专职数据库工程师（DBA + QA 混合型）|
    | 经验 | 3-8年，有实战经验，对新工具保持审慎 |
    | 已知（What层）| 数据库回归测试的流程、常见 BUG 类型、测试用例设计 |
    | 已知（How层）| SQL 调优、存储引擎原理、事务并发处理 |
    | 未知（Why层）| AI 为什么能提升测试效率（原理）、AI 在哪些场景比人工更可靠 |
    | 核心痛点 | 回归测试覆盖面不够、定位 BUG 根因慢 |
    | 期望带走物 | 「这个 AI 工具在 XX 场景值得试」|

    **已知陷阱（建议断舍离）：**
    - 不要解释「什么是回归测试」——他们比你更懂
    - 不要介绍「MySQL 有哪些存储引擎」——这是他们的日常工作

    请修改不准确的地方，然后我们进入主题收敛。
  Judge:
  - criterion: 识别信息充足后直接推进，没有重复追问已回答的场合/时长/听众信息
    points: 25
    tags:
    - axis:accuracy
  - criterion: 输出了完整的听众画像卡初稿，含角色/经验/已知区域（What+How层）/未知区域（Why层）/核心痛点/期望带走物六个字段
    points: 35
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 包含已知陷阱清单（至少2条），帮助讲者避免讲听众已知内容
    points: 25
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 邀请用户修改画像卡，然后进入主题收敛（不跳过 I4 直接进入 plan-details）
    points: 15
    tags:
    - axis:accuracy
