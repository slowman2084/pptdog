- id: case_8
  input: 我要做一个分享，听众有技术负责人、产品经理还有销售团队
  skill_type: conversational-guide
  notes: 验证混合型听众的处理——AI 需在第一轮识别混合听众带来的核心挑战（无法同时满足所有人），并引导用户确定核心服务对象
  expected_output: '技术负责人 + 产品经理 + 销售团队，这是混合听众，也是最难搞的场景之一。先搞清楚三件事：


    **Q0-1：场合类型**


    混合听众的分享，判断为**混合型**——开头用汇报型（让技术负责人和有决策权的人快速定位），主体用分享型（给不同背景的人都能理解的内容）。


    **Q0-2：这三类听众，谁是最重要的？**


    ```

    A. 技术负责人是主要受众（其他人是旁听）

    B. 产品经理是主要受众（需要对齐需求或方向）

    C. 销售团队是主要受众（他们需要能对外讲这个系统）

    D. 三者同等重要

    ```


    > 💡 混合听众最常见的失误是「试图让所有人都满意」，结果谁也没满足。

    > 你需要选一个主要受众，其他人是「顺带照顾」的。


    **Q0-3：时间多少分钟？**


    ---


    **这个分享，你真正想解决的问题是什么？**


    混合听众场景通常有一个隐藏目的：


    ```

    A. 对齐：让三方对某个方向 / 系统 / 决策达成共识

    B. 推动：让某一方接受你的方案或开始配合某件事  ← 最常见

    C. 展示：让大家看到团队价值，建立信任

    D. 其他

    ```


    > 💡 不同目的对应完全不同的结构。

    > 「对齐」需要把问题讲清楚；「推动」需要先讲痛点再讲方案；「展示」需要结论先行。


    告诉我主要受众、时间和真实目的，我帮你设计这个分享的主线。

    '
