testcases:
- id: case_0
  input: '我的 details.md 已经准备好了，素材有：

    M01 效率瓶颈（背景）

    M02 工具调研对比

    M03 选 Cursor 的决策依据（核心）

    M04 上线后代码审查时间降 40%（核心）

    M05 踩坑：上下文窗口不够（核心）

    M06 新人适应曲线（辅助）

    帮我把这些组织成演讲结构。

    '
  skill_type: conversational-guide
  notes: 验证 Happy Path 第一步：提供素材后 AI 应先做 CoT 推理分析，展示核心矛盾和三折逻辑链，不能跳过直接出骨架（I4/F4）。同时方案必须用
    M 编号素材填写（I1/F2）。
  expected_output: "好，基于你的素材，我先把推理过程说清楚，你确认逻辑对了之后我们再生成骨架。\n\n---\n\n**推理过程（请确认再继续）**\n\
    \n**核心矛盾：**\n你有三条核心素材——选型决策（M03）、效果数据（M04）、踩坑（M05）。\n矛盾在于：M04（成功）和 M05（踩坑）共存——这不是\"\
    一路成功\"的故事，也不是\"失败教训\"，而是\"成功了，但代价和坑是真实存在的\"。这正是一波三折结构最适合的素材形态。\n\n**三折逻辑链：**\n\
    - 折1：我们遇到了效率瓶颈（M01），决定引入 AI 工具，最终选了 Cursor（M03）。\n  → 这里已经够好了：选型做了，有依据。\n  → 但是——只有这一折的话，听众会想：\"\
    选完了然后呢？\"\n- 折2：上线了，数据确实改善（M04）。\n  → 看起来成功了。\n  → 但是——踩坑（M05）说明成功是有条件的，不是直接复制就能用。\n\
    - 折3：踩坑之后，我们形成了一套「适合我们团队的使用规范」。\n  → 这是听众最能带走的东西：不只是「Cursor 好用」，而是「在类似团队里用好 Cursor\
    \ 的关键点」。\n\n**因果验证：**\n- 折1 → 折2：因为做了正确的选型（M03 的判断依据），才有了 M04 的效果。✅ 有因果\n- 折2\
    \ → 折3：因为有了 M04 的效果，才值得花时间处理 M05 的坑（否则直接放弃）。✅ 有因果\n\n**反常识判断（大开门候选）：**\n\"我们引入\
    \ AI Coding 工具，效率提升了 40%\"——这是听众预期内的结论。\n反常识是：「踩了这些坑，差点放弃，但我们没有——原因是…」\n\n---\n\
    \n你觉得这个逻辑链有没有需要修正的地方？折3（「使用规范」）你现在有没有素材支撑，还是需要我们后面补充？\n"
  Judge:
  - criterion: 展示了完整的 CoT 推理过程（核心矛盾 + 三折逻辑链 + 因果验证 + 反常识判断），没有跳过直接出骨架
    points: 20
    tags:
    - axis:accuracy
  - criterion: 三折逻辑链用了 M 编号素材（M01/M03/M04/M05）填写，没有占位符
    points: 20
    tags:
    - axis:accuracy
  - criterion: 折与折之间有明确的因果关系描述，不是三段并列
    points: 20
    tags:
    - axis:accuracy
  - criterion: 邀请讲者确认推理逻辑后才继续，没有直接生成骨架
    points: 20
    tags:
    - axis:accuracy
  - criterion: 主动发现折3缺少素材支撑并提出来，体现主动发现问题的能力
    points: 20
    tags:
    - axis:accuracy
- id: case_1
  input: '（接上一轮，讲者确认推理逻辑后）

    逻辑没问题，折3的话我们后来写了一份内部使用手册，可以作为素材。继续吧。

    '
  skill_type: conversational-guide
  notes: 验证宏观方案多方案展示（I1）：讲者确认推理后，AI 应展示 2-3 个框架级方案，必须有实质差异（如一波三折 vs 问题串联），不能都是同一框架的变体（F1）。
  expected_output: '好，折3有内部使用手册素材，我把它加进来（记为 M07）。


    现在给你看两个方向不同的宏观框架，你选哪个更像你想讲的：


    ---


    **方案 A：一波三折（分享型叙事）**

    适合：你的核心价值是「真实经历 + 踩坑」，听众来学你的决策过程

    结构形状：问题引入 → 选型决策 → 成功但有坑 → 规范沉淀


    用你的素材填写：

    - 大开门：M01（效率瓶颈）的反常识版本——「我们差点因为这个坑放弃」

    - 折1：M03 选型决策——为什么选 Cursor，依据是什么

    - 折2：M04 效果 + M05 踩坑同时讲——成功是有代价的

    - 折3：M07 使用规范——你们的「教训转方法论」

    - 关门：听众能带走的：如何判断自己团队是否适合引入


    ---


    **方案 B：问题串联（Why 深度追问型）**

    适合：你想让听众跟着你的思考过程走，核心是判断逻辑

    结构形状：Why 这个问题重要 → Why 这样选 → Why 踩坑是必然的 → Why 规范有效


    用你的素材填写：

    - 大开门：M02 工具调研数据的反常识结论——「调研了三个工具，最后决定性因素是你想不到的」

    - 第1章：Why 要换工具——M01 效率瓶颈的本质是什么

    - 第2章：Why 选 Cursor——M03 决策依据的核心判断

    - 第3章：Why 踩坑是可预见的——M05 踩坑的根因

    - 第4章：Why 规范有效——M07 使用手册的核心原则

    - 关门：听众的 takeaway：AI 工具选型的通用判断框架


    ---


    这两个方向哪个更像你想讲的？或者想再看一个变体？

    '
  Judge:
  - criterion: 展示了两个框架级别有实质差异的方案（一波三折 vs 问题串联），不是同一框架的两个版本
    points: 20
    tags:
    - axis:accuracy
  - criterion: 两个方案都用 M 编号素材填写，没有占位符（[章节标题]等）
    points: 20
    tags:
    - axis:accuracy
  - criterion: 新增素材 M07 被加入方案中，素材更新有跟踪
    points: 20
    tags:
    - axis:accuracy
  - criterion: 每个方案有一句话特点描述，帮讲者快速判断哪个更适合
    points: 20
    tags:
    - axis:accuracy
  - criterion: 结尾等讲者选择，没有替讲者做决定
    points: 20
    tags:
    - axis:accuracy
- id: case_2
  input: '我选方案 A，但是想把第一折换成先讲效果数据，再讲选型过程，感觉开门见山更有冲击力。

    '
  skill_type: conversational-guide
  notes: 验证讲者修改时的替代方案机制（I5）：讲者提出的修改（先讲效果）会破坏方案 A 的递进关系（选型先于效果才有因果逻辑），AI 必须提供保持递进的替代方案，不能直接拒绝或不加解释地执行（F5）。
  expected_output: '我理解你的出发点——先抛 40% 数据确实冲击力强。不过这里有个逻辑问题需要你考虑一下：


    **如果先讲效果（M04），再讲选型（M03），会出现的问题：**

    听众在听效果的时候会想「好，他们用 Cursor 提升了 40%——但我不知道他们为什么选 Cursor，可能这个工具特别适合他们，不代表我能复制」。选型依据是让效果可信的前提，如果先说效果，它会显得像是结论前置的广告，而不是可复制的经验。


    ---


    **给你两个替代方案，都保留了「开门见山有冲击力」的感觉：**


    **替代方案 A1：用反常识当大开门（不破坏递进）**

    大开门改成：「我们换 AI Coding 工具，踩了这两个坑，差点放弃——代码审查时间还是降了 40%。」

    → 先抛结论（40% + 踩坑共存），制造「这怎么可能」的悬念

    → 折1 还是讲选型（为什么能做到 40%）

    → 折2 才揭示踩坑全貌

    → 递进关系完整，冲击力也在


    **替代方案 A2：把效果数据作为折1结尾的小揭晓（保留递进）**

    折1讲完选型后，用「这个判断让我们在三个月后看到了 40%」作为收尾句

    → 效果数据不是开门，是折1的结果验证，更有奖励感

    → 折2才是「但是——还有坑」


    ---


    你觉得哪个方向更像你想要的效果？如果这两个都不合适，告诉我你想要的感觉，我再想办法。

    '
  Judge:
  - criterion: 没有直接拒绝修改，也没有不加解释地执行（两个极端都没有）
    points: 20
    tags:
    - axis:accuracy
  - criterion: 解释了为什么先讲效果会破坏逻辑（让效果可信的前提是选型依据），而不只是说「不建议」
    points: 20
    tags:
    - axis:accuracy
  - criterion: 提供了至少2个保持递进关系的替代方案，且每个方案有具体的描述
    points: 20
    tags:
    - axis:accuracy
  - criterion: 每个替代方案保留了讲者想要的「冲击力」，体现理解讲者意图
    points: 20
    tags:
    - axis:accuracy
  - criterion: 结尾让讲者选择，而不是默认用某个替代方案
    points: 20
    tags:
    - axis:accuracy
- id: case_3
  input: '帮我想一个 AI 工具分享的结构

    '
  skill_type: conversational-guide
  notes: 验证素材驱动原则（I1/F2）：讲者没有提供 details.md 素材，AI 不应凭空生成结构，应先检查素材前置依赖。
  expected_output: '没问题，结构规划是 plan-mindmap 要做的事。不过有个前提需要确认：


    **你有 details.md 吗？**


    plan-mindmap 的核心原则是「结构从素材里长出来」——我需要知道你实际有哪些素材（M01、M02...），才能设计出适合你内容的结构。


    如果我现在凭空给你一个「AI 工具分享」的通用结构（比如：背景→选型→效果→经验），那个结构可能不适合你的素材。等你讲的时候，会发现有些章节没东西填、有些素材没地方放。


    建议：

    - 如果还没做 plan-details，先跑 `/plan-details` 把素材整理出来

    - 如果已经有素材清单了（即使不是 details.md 格式），把素材告诉我，我们可以开始


    你现在手边有什么素材吗？

    '
  Judge:
  - criterion: 没有直接生成通用结构框架（占位符方案）
    points: 25
    tags:
    - axis:accuracy
  - criterion: 解释了为什么需要先有素材（避免结构和素材错位），而不只是说「需要先做」
    points: 25
    tags:
    - axis:accuracy
  - criterion: 给出了两条可行路径（先做 plan-details，或直接提供素材清单）
    points: 25
    tags:
    - axis:accuracy
  - criterion: 语气是协作引导，不是拒绝或批评
    points: 25
    tags:
    - axis:accuracy
- id: case_4
  input: '（讲者选了方案 A1，AI 生成了骨架草稿，讲者审阅后说）

    整体没问题，但折3的「使用规范」能不能分成两个章节？一个讲技术层面的规范，一个讲团队层面的规范？

    '
  skill_type: conversational-guide
  notes: 验证 MECE 检查与递进保障（次需 I3/主需 I4）：讲者要求拆分章节，AI 应检查拆分后是否满足 MECE 且不破坏递进，并展示检查结果后让讲者确认。
  expected_output: '可以拆，但我先做一个快速检查，确保拆完之后结构没问题。


    **MECE 检查：「技术层面规范」vs「团队层面规范」**

    - 是否互斥（不重叠）：技术层面（上下文窗口管理、提示词写法）和团队层面（新人培训、代码审查流程调整）— 基本互斥，✅

    - 是否完整（无遗漏）：这两层是否覆盖了所有使用规范的维度？如果有「工程效能度量」相关规范，可能两层都没涵盖

    - 是否平行：两章都是「规范」，处于同一分析层面，✅


    **递进检查：拆成两章后的折3是否还有递进感？**

    现在折3变成了：

    - 3a：技术规范（先解决「工具怎么用好」）

    - 3b：团队规范（再解决「团队怎么配合」）

    这两章之间存在一个隐含的逻辑：「先有工具层面的标准，才能设计团队层面的配合」— 如果是这样，递进是 ✅ 的。


    请确认：技术规范和团队规范之间，有没有这个因果关系？还是它们是并行的两个维度？


    确认后我更新骨架。

    '
  Judge:
  - criterion: 执行了 MECE 检查，覆盖互斥/完整/平行三个维度
    points: 20
    tags:
    - axis:accuracy
  - criterion: 检查了递进关系是否被拆分破坏，提出了一个可能的因果链（先技术再团队）
    points: 20
    tags:
    - axis:accuracy
  - criterion: 等讲者确认「因果关系是否成立」后才更新骨架，而不是直接执行拆分
    points: 20
    tags:
    - axis:accuracy
  - criterion: MECE 检查发现了潜在遗漏（工程效能度量），主动提出
    points: 20
    tags:
    - axis:accuracy
  - criterion: 没有拒绝讲者的修改请求，也没有不加检查地直接执行
    points: 20
    tags:
    - axis:accuracy
- id: case_5
  input: '/plan-mindmap

    (用户当前目录下已经有一个手工调整过的 mindmap.md 存在)'
  skill_type: conversational-guide
  notes: 验证对用户手工劳动的尊重（增量优化机制）
  expected_output: 检测到该目录下已经存在 mindmap.md。请问您是希望我基于这份现有的大纲进行「增量优化/调整」，还是需要我完全推翻它，根据
    details.md「重新设计」？
  Judge:
  - criterion: 发现 mindmap.md 已存在时主动拦截，没有直接生成新大纲覆盖原文件
    points: 40
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 提供了「基于当前大纲增量优化」和「完全推翻重新设计」两种选择
    points: 30
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 将决策权交给讲者
    points: 30
    tags:
    - axis:accuracy
    - type:positive
