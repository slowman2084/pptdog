testcases:
  - id: case_0
    skill_type: plan-mindmap
    notes: "Happy Path — CoT 推理展示。讲者提供 details.md（含三类素材），要求生成 mindmap。校验 Skill 在输出任何结构方案前必须先完整展示 CoT 推理过程：核心矛盾识别 → 三折逻辑链 → 因果验证。来源：真实会话中 gen-slides 生成 DB 演讲骨架前的逻辑推导模式。"
    input: |
      我已经整理好了 details.md，请帮我生成演讲骨架。

      details.md 摘要（5条关键素材）：
      M1 [证据] Repomind 工具将数据库 BUG 定位从 3 天压缩到 2 小时（内部测试数据）
      M2 [证据] 传统数据库研测依赖人工 + 离线脚本，覆盖率仅 40%
      M3 [结论] AI 重构让研测覆盖率提升至 90%，同时测试周期缩短 70%
      M4 [行动] 计划 2025Q3 全面接入 AI 辅助研测平台
      M5 [证据] 三个核心场景：BUG 智能定位、用例自动生成、回归测试智能调度

      听众：数据库基础研发团队（50人，高级工程师为主）
      时长：45分钟
      目标：让大家理解 AI 重构研测的价值，并愿意参与试点
    expected_output: |
      [CoT 推理] 核心矛盾：传统研测效率低（M2）vs AI 重构带来的飞跃（M1/M3） → 听众最大障碍是"这真的有效吗？"而非"是什么"

      三折逻辑链：
      - 第一折（问题）：研测效率黑洞 — 为什么现状是不可接受的？
      - 第二折（转折）：AI 重构破局 — Repomind 等工具如何重写规则？
      - 第三折（行动）：从试点到体系 — 如何加入并推动变革？

      因果验证：M1→M3 数据链完整，M5 提供三场景支撑，M4 给出行动锚点 ✅

      ---

      [方案 A] 问题驱动型（一波三折）
      第一章：研测效率黑洞（M2）
      第二章：AI 破局三剑客（M1/M5）
      第三章：你的参与，重构未来（M3/M4）

      [方案 B] 成果引导型（先震撼后解构）
      第一章：90% 覆盖率是怎么做到的？（M3）
      第二章：技术拆解：三大场景实战（M5/M1）
      第三章：从数字到行动（M4）

      请问您倾向哪个方案？或者有想调整的地方？
    Judge:
      - criterion: "在输出任何方案前，必须展示完整 CoT 推理，包含：核心矛盾识别、三折逻辑链三段（第一折/第二折/第三折）、因果验证结论"
        points: 35
        tags:
          - "axis:process_compliance"
          - "type:positive"
      - criterion: "CoT 推理内容必须基于 details.md 中的具体素材编号（如 M1/M2），而非泛泛而谈"
        points: 25
        tags:
          - "axis:groundedness"
          - "type:positive"
      - criterion: "至少提供 2 个有实质差异的结构方案（框架逻辑不同，而非仅标题措辞不同），每个方案列出章节顺序和对应素材编号"
        points: 25
        tags:
          - "axis:option_diversity"
          - "type:positive"
      - criterion: "CoT 推理部分不得提前宣判'应该用哪个方案'，结构主权需交还给讲者（以问句结尾或明确等待讲者决策）"
        points: 15
        tags:
          - "axis:sovereignty"
          - "type:negative_check"

  - id: case_1
    skill_type: plan-mindmap
    notes: "方案选定后叙事线变体展示。讲者选择了'方案A 一波三折'后，Skill 应在同一框架内进一步展示 2 种叙事线排列，帮助讲者感知递进层次差异。来源：真实会话中讲者选择 story-type opening 后 Skill 未终止而是继续深化的行为模式。"
    input: |
      好，我选方案 A（问题驱动型）。

      [已有 mindmap.md 骨架（方案A框架）]
      第一章：研测效率黑洞
      第二章：AI 破局三剑客
      第三章：你的参与，重构未来
    expected_output: |
      好的，已锁定方案 A 框架。在三章结构内，叙事线排列会影响听众的情绪节奏：

      [叙事线 A1] 数据先行 — 用数字压迫感开场
      第一章：研测黑洞（先抛 40% 覆盖率痛点 → 再展示 3天定位BUG的案例）
      第二章：AI 三剑客（Repomind 2小时 → 用例自动生成 → 智能调度）
      第三章：行动号召（90% 覆盖率 → 试点计划 → 你的位置）
      节奏感：数据压迫 → 技术爆破 → 行动召唤，全程数字驱动

      [叙事线 A2] 故事先行 — 用真实 BUG 定位场景开场
      第一章：研测黑洞（先讲"一个工程师花了3天定位一个BUG"的故事 → 再揭示这是常态）
      第二章：AI 三剑客（故事续篇：同一BUG用 Repomind 2小时解决 → 三个场景）
      第三章：行动号召（故事收尾：工程师加入试点 → 你也可以）
      节奏感：共情 → 反转 → 感召，情感弧度更强

      请问您倾向哪种叙事节奏，还是想在某个章节内调整顺序？
    Judge:
      - criterion: "方案选定后，必须在同一框架内提供至少 2 种叙事线变体，每种变体必须描述章节内部的叙事节奏（不只是标题）"
        points: 35
        tags:
          - "axis:depth"
          - "type:positive"
      - criterion: "叙事线变体之间必须有实质差异（如'数据先行'vs'故事先行'），不能只改变标题措辞"
        points: 30
        tags:
          - "axis:option_diversity"
          - "type:positive"
      - criterion: "每种叙事线必须标注节奏感描述（如'数据压迫→技术爆破→行动召唤'），帮助讲者感知情绪弧度"
        points: 20
        tags:
          - "axis:usability"
          - "type:positive"
      - criterion: "叙事线展示结束后以问句结尾，明确等待讲者决策，不得自行选择或暗示'推荐'某种"
        points: 15
        tags:
          - "axis:sovereignty"
          - "type:negative_check"

  - id: case_2
    skill_type: plan-mindmap
    notes: "讲者修改破坏递进时的替代方案机制。讲者提出一个会打破现有递进逻辑的修改，Skill 不应拒绝也不应盲目执行，而是提供保持递进感的替代方案。来源：真实会话中 gen-slides 处理讲者对 slide 顺序修改请求时的协商模式。"
    input: |
      [已有 mindmap.md]
      第一章：研测黑洞（痛点）→ 第二章：AI 三剑客（方案）→ 第三章：行动召唤

      我想把第三章"行动召唤"移到最前面，先展示成果再讲问题。
    expected_output: |
      理解你的想法——先展示成果有"先震撼后解构"的效果。不过把第三章移到最前面，当前骨架的递进张力会有变化：

      原方案递进：痛点压迫 → 破局揭示 → 行动感召（情绪低谷→爆发→升华）
      修改后：成果展示 → 痛点回溯 → 技术解构（情绪开门见山→补充背景→收尾）

      如果目的是"先让听众信服再讲细节"，有两个既保持开场冲击力又不失递进的方式：

      [替代方案 1] 成果钩子开场（不移整章，仅调整第一章开头）
      第一章开头：用 90% 覆盖率 + 2小时定位 BUG 作为钩子（30秒抛出） → 然后说"但我们是怎么从 40% 的泥潭里走出来的？"→ 回到研测黑洞

      [替代方案 2] 双线叙事（两章合并）
      第一章：成果对比（旧世界 40% vs 新世界 90%）→ 本身就包含了痛点和成果
      第二章：AI 三剑客（拆解成果如何实现）
      第三章：行动召唤

      请问哪个方向更接近你想要的感觉？
    Judge:
      - criterion: "明确解释原有递进逻辑会受到怎样影响（不只是'会有变化'，需具体说明情绪弧度的变化）"
        points: 30
        tags:
          - "axis:transparency"
          - "type:positive"
      - criterion: "必须提供至少 2 个替代方案，每个替代方案能满足讲者的核心诉求（开场冲击力）同时保持递进感，且方案之间有实质差异"
        points: 35
        tags:
          - "axis:solution_quality"
          - "type:positive"
      - criterion: "不得拒绝讲者的修改意图，也不得直接执行（盲目覆盖 mindmap.md），而是以协商方式提供替代路径"
        points: 35
        tags:
          - "axis:sovereignty"
          - "type:negative_check"

  - id: case_3
    skill_type: plan-mindmap
    notes: "MECE 完整性检查。讲者提出的骨架在某个维度存在遗漏或重叠，Skill 需主动识别并指出，但以'发现机会'而非'报告错误'的方式提问。来源：真实会话中对数据库研测主题的多场景覆盖性分析。"
    input: |
      我想用这个骨架：

      第一章：BUG 智能定位（Repomind 工具）
      第二章：用例自动生成（AI 辅助）
      第三章：测试周期压缩（整体效率）

      这三章覆盖了研测的核心能力，你觉得怎么样？
    expected_output: |
      框架整体清晰，覆盖了工具层（第一/二章）和效率层（第三章）。有一个维度可以再看一下：

      第一章和第二章都是具体工具/能力，但第三章"测试周期压缩"是结果指标，层级不一致——听众可能会有"第三章讲什么？"的困惑。

      另外，"智能调度"（回归测试的自动触发逻辑）在三章中都没有直接落脚点，是有意省略还是可以归入某章？

      两个可能的调整方向（供参考，不需要现在决定）：

      [方向 1] 三能力并列（保持工具层一致）
      第一章：BUG 智能定位
      第二章：用例自动生成
      第三章：回归智能调度
      → 第三章作为 Summary 展示整体提效数据（90%/70%）

      [方向 2] 能力→效果双层结构
      第一章：三大 AI 能力（三场景并列）
      第二章：效率变革（70%/90% 数据 + 体验对比）
      第三章：行动（试点路径）
      → 更适合以成果说话的场景

      你对"智能调度"这个能力如何定位？
    Judge:
      - criterion: "必须识别并指出骨架中存在的 MECE 问题（重叠、遗漏或层级不一致），且说明具体是哪里不一致"
        points: 35
        tags:
          - "axis:mece_check"
          - "type:positive"
      - criterion: "指出 MECE 问题时采用'发现机会'语气（如'有一个维度可以再看一下'），而非报错口吻（如'你的骨架有问题'）"
        points: 25
        tags:
          - "axis:tone"
          - "type:positive"
      - criterion: "提供至少 2 个保持讲者原有意图的调整方向（而非只有一个'正确答案'），最后以问句将决策权还给讲者"
        points: 25
        tags:
          - "axis:option_diversity"
          - "type:positive"
      - criterion: "调整方向必须具体到章节列表，不能只停留在原则层面的建议"
        points: 15
        tags:
          - "axis:concreteness"
          - "type:positive"

  - id: case_4
    skill_type: plan-mindmap
    notes: "Re-entry 保护 — mindmap.md 已有手工修改时不覆盖。用户已有手工修改过的 mindmap.md，再次触发 plan-mindmap 时 Skill 不得直接覆盖，而是展示差异并询问处理方式。来源：真实会话中多次迭代修改骨架时的保护机制需求。"
    input: |
      我上次生成的 mindmap.md 我做了一些手工调整，但我想再过一遍结构，看看有没有遗漏。

      [当前 mindmap.md 内容]
      第一章：研测困局（已手工删除"数据对比"小节，改为纯叙事开场）
      第二章：AI 破局三剑客（手工调整了三个场景的顺序：调度→定位→生成）
      第三章：行动路线（手工增加了"风险评估"小节）
    expected_output: |
      检测到 mindmap.md 已有手工修改，我不会覆盖它。

      先确认一下你的修改意图：

      **第一章**：删除了"数据对比"小节，改为纯叙事开场
      → 这会影响听众对问题严重性的感知——纯叙事更有代入感，但数据支撑会弱化。你是为了更自然的开场节奏吗？

      **第二章**：场景顺序改为 调度→定位→生成
      → 原顺序（定位→生成→调度）是"工具复杂度递进"逻辑，新顺序更像"流程顺序"逻辑。两种都合理，只是叙事逻辑不同。

      **第三章**：增加了"风险评估"小节
      → 很好的补充，能回应听众"会不会引入新风险？"的顾虑。

      基于以上，你想：
      A. 保留所有手工修改，只做结构审查（我只提建议，不改文件）
      B. 针对某处修改生成替代方案对比
      C. 在手工修改基础上重新跑 MECE 检查
    Judge:
      - criterion: "检测到 mindmap.md 已有手工修改时，必须明确声明'不会覆盖'，不得直接生成新的骨架并写入文件"
        points: 40
        tags:
          - "axis:re_entry_protection"
          - "type:negative_check"
      - criterion: "对每处手工修改必须进行分析（修改意图推断 + 潜在影响说明），不能只罗列修改点"
        points: 30
        tags:
          - "axis:analysis_quality"
          - "type:positive"
      - criterion: "分析结束后提供明确的多选项（至少3个），让讲者决定下一步处理方式，而非自行决定如何处理"
        points: 30
        tags:
          - "axis:sovereignty"
          - "type:positive"
