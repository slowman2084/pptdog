testcases:
- id: case_0
  input: |
    /slide-content-and-scripts
    （项目 db-effective-practise，已有 mindmap.md（结构方案A一波三折，3折+大开门+关门，约63分钟）和 details.md（含素材 M01-M09）。用户不做任何额外说明，直接触发 Skill。）
  skill_type: content-generation
  notes: |
    Happy Path：验证高效执行者模式——已有完整 mindmap + details 时，AI 应一次性生成完整 slide-content.md，并在完成后输出整体概览表（章节/页数/核心内容）和关键设计决策说明，全程不打断用户等待确认。这是本次真实使用中产生满意结果的核心场景。
  expected_output: |
    好，先读一下 mindmap.md 确认完整骨架，然后一次性生成所有 Slides。

    （读取 mindmap.md 和 details.md 后）

    好，材料齐全。开始逐页生成完整 slide-content.md。

    （生成完成后）

    完成。slide-content.md 已生成并保存。

    ---
    整体概览

    ┌────────┬──────┬─────────────────────────────────────────────────────────────────┐
    │  章节  │ 页数 │                            核心内容                             │
    ├────────┼──────┼─────────────────────────────────────────────────────────────────┤
    │ 封面   │ 1    │ 标题页                                                          │
    ├────────┼──────┼─────────────────────────────────────────────────────────────────┤
    │ 大开门 │ 3    │ 故事型开场                                                      │
    ├────────┼──────┼─────────────────────────────────────────────────────────────────┤
    │ 第一折 │ 8    │ 效率革命：三大痛点 → 自动闭环 → 数字 + 伏笔                     │
    ├────────┼──────┼─────────────────────────────────────────────────────────────────┤
    │ 第二折 │ 8    │ 深水区：测评 → Why三层根因 → 破局 → 伏笔                        │
    ├────────┼──────┼─────────────────────────────────────────────────────────────────┤
    │ 第三折 │ 9    │ 自愈闭环：根因升维 → 闭环机制 → 案例 → 角色跃迁                 │
    ├────────┼──────┼─────────────────────────────────────────────────────────────────┤
    │ 关门   │ 4    │ 架构 → 避坑 → 行动 → 首尾呼应                                  │
    ├────────┼──────┼─────────────────────────────────────────────────────────────────┤
    │ 附录   │ 2    │ Q&A + 参考资料                                                  │
    ├────────┼──────┼─────────────────────────────────────────────────────────────────┤
    │ 合计   │ 35   │ 约 63 分钟                                                      │
    └────────┴──────┴─────────────────────────────────────────────────────────────────┘

    ---
    几个关键设计决策说明

    1. 三折伏笔全部埋好：折1结尾埋下伏笔 → 折2展开 → 折3收口，逻辑链完整
    2. 截图页单独处理：重要截图分两页展示，最大化视觉冲击力
    3. 概念解释防御：全程没有解释「什么是回归测试」「什么是 MCP」等基础概念

    ---
    下一步可以用 /gen-slides 将这个 slide-content.md 转换成实际 PPT 文件。
  Judge:
  - criterion: 一次性生成完整 slide-content.md，未在生成途中停下来请求用户确认章节安排
    points: 20
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 生成后输出了整体概览表，包含章节/页数/核心内容三列，以及合计行（总页数 + 时长估算）
    points: 25
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 输出了关键设计决策说明（至少2条，说明 AI 对演讲结构的理解，而非机械翻译 mindmap）
    points: 25
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 生成的章节顺序与 mindmap.md 完全一致，未自行重排或合并章节
    points: 20
    tags:
    - axis:accuracy
  - criterion: 末尾提示了下一步可使用 /gen-slides
    points: 10
    tags:
    - axis:accuracy

- id: case_1
  input: |
    我已有 mindmap.md（章节顺序：大开门 → 第一折：效率 → 第二折：深水区 → 第三折：闭环 → 关门），请帮我生成 slide-content.md。
    mindmap 里明确写了「结构方案A（一波三折）」，折1-折2-折3顺序不变。
  skill_type: content-generation
  notes: |
    骨架忠实度验证：mindmap.md 是唯一骨架，AI 必须严格按其章节顺序和论点顺序生成 slide-content.md，不得重排、合并、新增章节，即使 AI 认为某种调整"更有逻辑感"。这是 I1（叙事主权）的核心硬约束。
  expected_output: |
    （读取 mindmap.md 后，按大开门→第一折→第二折→第三折→关门顺序逐章生成）

    （生成的 slide-content.md 完全按照 mindmap 的章节顺序和论点顺序）

    （不出现"我觉得把第一折移到第三折更有递进感"或类似重排建议）
  Judge:
  - criterion: 生成的 slide-content.md 章节顺序与 mindmap 完全一致（大开门→折1→折2→折3→关门，不重排）
    points: 30
    tags:
    - axis:accuracy
  - criterion: 未新增 mindmap 中不存在的章节，未合并任何两个章节
    points: 25
    tags:
    - axis:accuracy
  - criterion: 所有折内论点按 mindmap 中的子节点顺序出现
    points: 25
    tags:
    - axis:accuracy
  - criterion: 没有出现「我建议把 XX 章节移到 XX 位置」或类似自作主张重排结构的表述
    points: 20
    tags:
    - axis:accuracy

- id: case_2
  input: |
    /slide-content-and-scripts
    （项目已有 mindmap.md 和 details.md，用户希望在生成前先看时长估算。）
  skill_type: content-generation
  notes: |
    时长估算（Step 1）：在正式生成 slide-content.md 之前，AI 应先输出时长汇总表，按章节估算每节的预计演讲时间，帮助讲者判断是否需要删减内容。这是 I3（细粒度执行）的关键步骤。
  expected_output: |
    （读取 mindmap + details 后）

    Step 1：时长预估

    | 章节 | 论点数 | 内容量等级 | 有伪动画 | 预估分钟 |
    |------|--------|-----------|---------|---------|
    | 大开门 | 2 | M | N | 5 |
    | 第一折 | 4 | L | Y | 16 |
    | 第二折 | 4 | L | N | 14 |
    | 第三折 | 5 | L | Y | 18 |
    | 关门 | 3 | M | N | 8 |
    | **合计** | | | | **61 分钟** |

    > ⚠️ 预估时长 61 分钟，目标 60 分钟，基本符合。

    继续生成 slide-content.md…
  Judge:
  - criterion: 输出了时长汇总表，包含章节/论点数/内容量等级/伪动画标记/预估分钟五列
    points: 35
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 有合计行，包含总预估时长
    points: 25
    tags:
    - axis:accuracy
  - criterion: 若预估时长与目标时长差异 >5 分钟，输出了 ⚠️ 提醒
    points: 20
    tags:
    - axis:accuracy
  - criterion: 时长估算后继续生成 slide-content.md，未停下来等用户回复
    points: 20
    tags:
    - axis:accuracy

- id: case_3
  input: |
    请生成 slide-content.md。mindmap 中有一折要讲「AI 辅助回归测试」，details 里有「MySQL 并发 BUG」的背景说明，听众是技术团队资深研发。
  skill_type: content-generation
  notes: |
    空姐效应防御（I2 双通道协调的核心）：对于技术听众，AI 不得在 slide-content.md 中插入对基础概念的解释（如「什么是回归测试」「什么是 MySQL 并发 BUG」）。这些概念对目标听众是已知的，解释会浪费宝贵时间并显得不专业。本次真实使用中 AI 明确标注了「空姐效应防御」。
  expected_output: |
    （生成的 slide-content.md 中，涉及回归测试/MySQL BUG 等概念时直接进入内容，不做概念解释）

    （演讲脚本示例：「这个 BUG 的根因是 MySQL 8.0 的并发锁竞争，我们的 Repomind 在 48 小时内完成了自动定位……」而不是「回归测试是指在软件修改后重新测试……」）

    （PPT 页面：直接呈现数字、图表、对比，不出现「什么是 XX」式的说明段落）
  Judge:
  - criterion: slide-content.md 中没有出现「XX 是指」「什么是 XX」「简单介绍一下」等概念解释模式
    points: 35
    tags:
    - axis:accuracy
  - criterion: 演讲脚本直接从数字/案例/判断切入，不以概念定义开始
    points: 35
    tags:
    - axis:accuracy
  - criterion: PPT 视觉内容侧重数字、对比、结论，不出现教科书式的「概念→分类→案例」三段论结构
    points: 30
    tags:
    - axis:accuracy

- id: case_4
  input: |
    /slide-content-and-scripts
    （用户当前项目下已有手工修改过的 slide-content.md，但用户更新了 mindmap.md 中的第三折标题。）
  skill_type: content-generation
  notes: |
    Re-entry 保护机制：发现目标文件已存在时，AI 必须拦截并给出选择，不能直接覆盖用户已有的手工劳动。这是 I1（叙事主权）和 I5（容错友好）的交叉保障。
  expected_output: |
    ⚠️ 检测到 slide-content.md 已存在（上次生成于 2026-05-02，共 1159 行）。

    直接覆盖会丢失你的手工修改。有三个选项：

    A. **增量更新**——仅重新生成与 mindmap 变更对应的章节（第三折），保留其他页面不动
    B. **全量重写**——丢弃已有文件，按当前 mindmap + details 全新生成（不可恢复）
    C. **先备份再重写**——将现有文件备份为 slide-content_backup.md 后全量重写

    你想选哪个？
  Judge:
  - criterion: 发现 slide-content.md 已存在时，主动提出拦截确认，没有直接覆盖
    points: 40
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 提供了增量更新（只改变化部分）的选项，不强迫用户全量重写
    points: 30
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 将决策权交给用户（等待回复），未替用户自动选择某个选项
    points: 30
    tags:
    - axis:accuracy
    - type:positive
