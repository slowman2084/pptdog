    **PPT 上放：**

    ...[可复述的记忆地图]...'
  Judge:
  - criterion: 包含了「目标：听众能3分钟内向同事复述核心内容」的提示
    points: 40
    tags:
    - axis:accuracy
    - type:positive
  - criterion: PPT 内容设计了一张结构化的「可复述的记忆地图」（包含核心脉络，而不是松散列表）
    points: 30
    tags:
    - axis:accuracy
    - type:positive
  - criterion: 演讲口头说是一段精炼的短句，将全场压缩成一个易于背诵的精华
    points: 30
    tags:
    - axis:accuracy
    - type:positive
