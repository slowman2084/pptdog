testcases:
- id: case_0
  input: '以下是一个演讲 slide-content.md 的片段，包含一页有背稿风险的核心讲解页：


    ### Slide 8 — 三步法的底层逻辑

    **演讲口头说：**

    - 承接上一页：好，看完了什么是分级告警，我们来说说我们是怎么建立这套体系的

    - 核心内容：第一，我们需要先盘点所有的告警类型，这个过程大概花了两周，主要是和各个业务团队对齐，确认哪些服务是核心服务，哪些告警真的需要P1级别的响应。我们定义P1就是直接影响用户可用性，必须在15分钟内响应。P2是影响部分用户，30分钟响应。P3是内部服务，可以在下个工作日处理。然后第二步，我们要为每个级别建立不同的响应流程，P1要直接打电话，P2发钉钉，P3记工单。第三步，上线之后我们发现还有很多误报，所以我们每两周会做一次review，看看哪些告警的级别设错了。这个过程大概又花了一个月。整个三步法执行下来，我们的P1告警从每天20条降到了3条。

    - 铺垫下一页：那这三步法有没有什么坑呢？有，下面来说


    目标时长：30 分钟

    请进行演讲交付性审查，重点检查背稿风险。

    '
  skill_type: analysis-review
  notes: 验证F1失败模式的反面——背稿风险 suggestion 的 options A 必须写出具体压缩后文字（≤150字），而非方向说明'建议压缩'
  expected_output: "\U0001F4CA 时长估算：\n  演讲稿总字数：约 267 字（核心内容段）\n  预计演讲时长：约 2.67 分钟（此页）\n\
    \  目标时长    ：30 分钟\n\n## 演讲交付审查结果 — qcon-demo\n\n| # | 维度 | 严重程度 | 位置 | 问题摘要 |\n\
    |---|------|---------|------|---------|\n| delivery-001 | 背稿风险 | \U0001F7E1 major\
    \ | Slide 8「三步法的底层逻辑」 | 这页演讲口头说有260多字，基本上要背完整稿才能讲——忘词风险很高，台上一旦卡顿就很难救回来 |\n\ndelivery-001\
    \ 建议选项：\nA. 压缩到核心提示词（约120字）：\n   \"P1定义：直接影响用户，15分钟响应。P2：影响部分用户，30分钟。P3：内部服务，次日处理。\n\
    \   三步：①两周盘点 → 按影响分级 ②每级不同响应（P1电话/P2钉钉/P3工单）③每两周review误报\n   结果：P1从20条降到3条。\n\
    \   （括号里的是想起来再说的细节，忘了也没关系）\"\n   推荐理由：保留了三步法的核心逻辑和最重要的结果数字，其余细节临场发挥，130字以内可流畅说完\n\
    \nB. 拆成两页：\n   \"第一页讲P1/P2/P3的定义和响应时间，第二页讲三步执行流程——每页120字左右，每页一个核心信息点\"\n\n✅ 审查完成，JSON\
    \ 已写入：~/.pptdog/.../delivery-20260422T100000.json\n"
  Judge:
  - criterion: 生成了 dimension='背稿风险' 的 suggestion（演讲口头说>200字）
    points: 25
    tags:
    - axis:accuracy
  - criterion: options A 写出了具体压缩后的演讲文字（约120字），而非'建议压缩至150字'
    points: 25
    tags:
    - axis:accuracy
  - criterion: 压缩后版本保留了核心论点（三步法 + P1从20条降到3条）
    points: 25
    tags:
    - axis:accuracy
  - criterion: problem 字段用口语描述（不含'背稿风险阈值超标'等术语）
    points: 25
    tags:
    - axis:accuracy
- id: case_1
  input: '以下演讲有三个情绪节点，请检查情绪弧度：


    开场（Slide 1演讲口头说）：

    "大家好，我是张三，来自基础平台团队。今天给大家分享我们过去一年在监控建设方面的一些实践，希望能对大家有所帮助。"


    中段（Slide 7演讲口头说）：

    "完成了三步法之后，我们在下一个季度进行了测试，结果显示性能有所提升，效果还不错。"


    结尾（最后一页演讲口头说）：

    "以上就是我们的全部分享内容，谢谢大家的聆听，如果有问题的话可以会后找我交流，谢谢。"


    请审查情绪弧度，使用严格3类高潮点标准（D1A）。

    '
  skill_type: analysis-review
  notes: 验证D1A严格3类高潮点——开场无情绪钩子、中段无数字冲击/反转/顿悟三类高潮、结尾无升华，三个节点全部缺失，应生成 critical suggestion
  expected_output: "## 演讲交付审查结果 — qcon-demo\n\n情绪弧度分析：\n  节点1 开场情绪钩子：❌ 未检测到（纯自我介绍+目的说明，无情绪制造）\n\
    \  节点2 中段高潮点（严格3类）：❌ 未检测到（\"效果还不错\"属于模糊定性，不是数字冲击/反转揭晓/方法论顿悟任一类）\n  节点3 情绪收尾：❌\
    \ 未检测到（\"谢谢大家\"是无升华的礼貌结束语）\n\n| # | 维度 | 严重程度 | 位置 | 问题摘要 |\n|---|------|---------|------|---------|\n\
    | delivery-002 | 情绪弧度 | \U0001F534 critical | 全篇 | 三个关键情绪节点全部缺失：开场没有让听众\"想听\"\
    的钩子，中段没有让听众\"哇\"的高潮，结尾没有让听众带着情绪离开的升华——整场演讲情绪是平的 |\n\ndelivery-002 建议选项：\nA. 重写开场情绪钩子：\n\
    \   \"「凌晨两点，我接到一个电话，说我们最核心的支付服务挂了。我看了一眼监控——200条告警，密密麻麻全是红色。然后我花了43分钟才找到真正的问题。43分钟。」（停顿）这是一年前的事。今天我来告诉你，同样的问题，现在我们3分钟能搞定。\"\
    \n"
  Judge:
  - criterion: 三个情绪节点（开场/高潮/收尾）全部识别为缺失
    points: 20
    tags:
    - axis:accuracy
  - criterion: 生成了 severity='critical' 的 suggestion（三节点全部缺失）
    points: 20
    tags:
    - axis:accuracy
  - criterion: '''效果还不错''被正确判断为非高潮点（不属于数字冲击/反转/顿悟3类）'
    points: 20
    tags:
    - axis:accuracy
  - criterion: options 写出了具体的开场重写话术，包含完整的故事和数字
    points: 20
    tags:
    - axis:accuracy
  - criterion: 不使用'情绪弧度缺失'等方法论术语描述 problem
    points: 20
    tags:
    - axis:accuracy
- id: case_2
  input: '以下是一个演讲的时长估算信息：


    目标时长：30分钟

    演讲口头说总字数：约2100字（从 slide-content.md 提取所有演讲口头说段落统计）


    按100字/分钟估算，预计演讲时长约21分钟。


    请根据时长差异生成相应的建议。

    '
  skill_type: analysis-review
  notes: 验证D2A容忍区间（±20%）的正向案例——21分钟 vs 目标30分钟，差异30%（不足），超过20%容忍，应触发 major suggestion；同时验证F3反面——时长数字必须在Console打印
  expected_output: "\U0001F4CA 时长估算：\n  演讲稿总字数：约 2100 字\n  预计演讲时长：约 21 分钟\n  目标时长\
    \    ：30 分钟\n  差异        ：不足 9 分钟（差距 30%，超过 ±20% 容忍区间）\n\n## 演讲交付审查结果 — qcon-demo\n\
    \n| # | 维度 | 严重程度 | 位置 | 问题摘要 |\n|---|------|---------|------|---------|\n| delivery-003\
    \ | 时长估算 | \U0001F7E1 major | 全局 | 按现在的内容，大概只能讲21分钟，比目标30分钟少了将近10分钟——这要么说明有些内容可以讲得更深，要么需要增加听众互动，否则提前结束会显得准备不够充分\
    \ |\n\ndelivery-003 建议选项：\nA. 扩充某个案例细节（建议扩充开篇故事）：\n   \"在开篇故事那页，把'凌晨两点接到电话'那段展开讲：当时在想什么、看到200条告警的第一反应、如何一步步缩小范围定位——这个案例完整讲完可以增加3-4分钟，而且会让听众更有代入感\"\
    \nB. 增加互动停顿（3处）：\n   \"在第2章开始前问：「你们团队现在每天收到多少条告警？觉得可以接受的举手」（停30秒互动）；在三步法后问：「你们最难的会是哪一步？」；在结尾前留3分钟Q&A\"\
    \nC. 增加 Q&A 时间：\n   \"演讲本身维持21分钟，告知听众剩余9分钟做Q&A，把Q&A作为正式环节而不是可选加餐\"\n"
  Judge:
  - criterion: Console 输出包含'演讲稿总字数：约2100字 / 预计21分钟 / 目标30分钟'三个具体数字
    points: 25
    tags:
    - axis:accuracy
  - criterion: 差距30%超过±20%容忍，正确生成 major suggestion（而非 minor）
    points: 25
    tags:
    - axis:accuracy
  - criterion: options A 具体指出了可扩充的案例位置，而非'建议扩充案例细节'
    points: 25
    tags:
    - axis:accuracy
  - criterion: options B 提供了3个具体的互动停顿位置
    points: 25
    tags:
    - axis:accuracy
- id: case_3
  input: '以下是演讲开场的书面语检查：


    ### Slide 1 — 开场演讲口头说

    "尊敬的各位嘉宾，大家好。通过本次分享，旨在系统性梳理基础平台团队在监控体系建设方面的实践探索，深度剖析核心痛点及解决路径。在信息化高速发展的当下，统筹规划监控基础设施，稳步推进告警体系的精细化治理，已成为提升研发效能的重要抓手。接下来，我将从以下几个方面进行阐述。"


    请检查口语化程度。

    '
  skill_type: analysis-review
  notes: 验证口语化检查——包含多个书面语信号：'旨在'/'统筹规划，稳步推进'/'重要抓手'/'以下几个方面进行阐述'，应触发 critical（开场是最重要的部分）
  expected_output: "## 演讲交付审查结果 — qcon-demo\n\n| # | 维度 | 严重程度 | 位置 | 问题摘要 |\n|---|------|---------|------|---------|\n\
    | delivery-004 | 口语化 | \U0001F534 critical | Slide 1 开场演讲口头说 | 开场这段读出来很像在念公文——\"\
    旨在系统性梳理\"、\"统筹规划\"、\"重要抓手\"这些词是写文章的语气，不是跟人说话的语气。台上说这些，听众会感觉很远，不会觉得\"这个人在跟我说话\"\
    \ |\n\ndelivery-004 建议选项：\nA. 改写为口语化版本：\n   \"（走上台，停顿2秒，扫视全场）\n   你们有没有遇到过——凌晨被叫醒，告警响了，但是看着几百条红色警报，根本不知道从哪里查起？\n\
    \   （停顿）\n   一年前，这是我们团队的常态。今天，我来说说我们是怎么解决这个问题的，以及你们回去可以怎么用。\"\n   推荐理由：用听众熟悉的场景作为开场，让他们立刻代入，而不是听一段自我介绍\n"
  Judge:
  - criterion: 正确识别出多个书面语信号：'旨在'/'统筹规划稳步推进'/'重要抓手'
    points: 20
    tags:
    - axis:accuracy
  - criterion: 生成了 severity='critical' 的 suggestion（开场是最重要部分）
    points: 20
    tags:
    - axis:accuracy
  - criterion: options A 写出了完整的口语化改写版本（短句、停顿感、能直接说）
    points: 20
    tags:
    - axis:accuracy
  - criterion: problem 字段不含'口语化不足/书面语违规'等术语
    points: 20
    tags:
    - axis:accuracy
  - criterion: 改写版本有明显的口语特征（问句、停顿提示、'一年前...'这类对话感）
    points: 20
    tags:
    - axis:accuracy
